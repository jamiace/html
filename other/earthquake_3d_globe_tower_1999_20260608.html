<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D 地震地球塔｜M6.5+｜1999-2026</title>
  <style>
    :root{
      --bg:#060812; --panel:rgba(12,16,30,.80); --panel2:rgba(255,255,255,.08);
      --text:#eef3ff; --muted:#9aa7bd; --accent:#ffcc66; --danger:#ff5f6d;
      --line:rgba(255,255,255,.14);
    }
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);}
    #app{position:fixed;inset:0;}
    canvas{display:block;}
    .hud{
      position:fixed;left:18px;top:18px;width:min(430px,calc(100vw - 36px));
      background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--line);
      border-radius:18px;box-shadow:0 18px 55px rgba(0,0,0,.35);overflow:hidden;
    }
    .head{padding:18px 18px 14px;border-bottom:1px solid var(--line);}
    h1{font-size:20px;margin:0 0 6px;font-weight:850;letter-spacing:.02em;}
    .sub{font-size:13px;color:var(--muted);line-height:1.45;}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 18px;border-bottom:1px solid var(--line);}
    .stat{background:var(--panel2);border-radius:12px;padding:10px;}
    .stat b{font-size:20px;display:block;}
    .stat span{font-size:12px;color:var(--muted);}
    .controls{padding:12px 18px;display:grid;gap:10px;border-bottom:1px solid var(--line);}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    button,select,input[type="range"],input[type="checkbox"]{accent-color:var(--accent);}
    button,select{
      background:rgba(255,255,255,.1);color:var(--text);border:1px solid var(--line);
      border-radius:10px;padding:9px 10px;font-weight:700;cursor:pointer;
    }
    button:hover{background:rgba(255,255,255,.16);}
    label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}
    label.flex{flex:1;min-width:240px;}
    #info{padding:14px 18px;min-height:172px;}
    .empty{color:var(--muted);font-size:14px;line-height:1.6;}
    .quakeTitle{font-size:17px;font-weight:850;margin-bottom:8px;line-height:1.35;}
    .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,95,109,.16);border:1px solid rgba(255,95,109,.35);border-radius:999px;padding:4px 9px;color:#ffd7db;font-weight:800;margin-right:6px;}
    .meta{font-size:13px;color:var(--muted);line-height:1.65;}
    .meta b{color:var(--text);}
    .original{font-size:12px;color:#77859d;margin-top:4px;}
    .floors{margin-top:10px;max-height:190px;overflow:auto;border-top:1px solid var(--line);padding-top:10px;}
    .floorBtn{
      display:flex;width:100%;justify-content:space-between;align-items:center;margin:5px 0;
      text-align:left;font-size:12px;padding:8px 9px;border-radius:10px;background:rgba(255,255,255,.065);
    }
    .floorBtn.active{outline:2px solid rgba(255,204,102,.75);background:rgba(255,204,102,.14);}
    .legend{
      position:fixed;right:18px;bottom:18px;max-width:420px;background:var(--panel);
      backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:16px;padding:12px 14px;
      font-size:12px;color:var(--muted);line-height:1.55;
    }
    .loading{
      position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
      background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 22px;
      box-shadow:0 18px 55px rgba(0,0,0,.35);font-weight:800;z-index:5;text-align:center;line-height:1.6;
    }
    a{color:#9bd5ff;text-decoration:none;}
    a:hover{text-decoration:underline;}
    .small{font-size:12px;color:var(--muted);}
    @media(max-width:720px){
      .hud{left:10px;top:10px;width:calc(100vw - 20px);max-height:70vh;overflow:auto;}
      .legend{left:10px;right:10px;bottom:10px;max-width:none;}
      h1{font-size:18px;}
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="app"></div>

<section class="hud">
  <div class="head">
    <h1>3D 地震地球塔｜M6.5+</h1>
    <div class="sub">範圍：1999-01-01 至 2026-06-08。拖曳旋轉、滾輪縮放；點選樓層只顯示資訊，不改變地球旋轉軸心。</div>
  </div>
  <div class="stats">
    <div class="stat"><b id="count">—</b><span>地震筆數</span></div>
    <div class="stat"><b id="zones">—</b><span>區域塔數</span></div>
    <div class="stat"><b id="maxMag">—</b><span>最大規模</span></div>
  </div>
  <div class="controls">
    <div class="row">
      <button id="reload">重新載入</button>
      <button id="spin">暫停自轉</button>
      <button id="resetView">回到地心視角</button>
    </div>
    <div class="row">
      <label class="flex">同區域格網
        <input id="grid" type="range" min="0.5" max="6" step="0.5" value="2">
        <span id="gridLabel">2°</span>
      </label>
    </div>
    <div class="row">
      <label><input id="bordersToggle" type="checkbox" checked> 顯示國界線</label>
      <label><input id="labelsToggle" type="checkbox" checked> 顯示地震塔</label>
    </div>
  </div>
  <div id="info"><div class="empty">點選地球上的任一樓層，這裡會顯示該筆地震資訊。若同一區域有多筆地震，下方清單可任選任一層。</div></div>
</section>

<div class="legend">
  <b style="color:var(--text)">堆疊規則</b><br>
  同一區域以經緯度格網分組，預設 2°。每筆 M6.5+ 地震會堆成一層樓；越靠近地表越新，越往外越舊。顏色越紅代表規模越大。資料來源：USGS Earthquake Catalog API；國界線來自公開 GeoJSON。
</div>

<div id="loading" class="loading">正在載入 3D 模組、國界線與地震資料…<br><span class="small">第一次載入 1999-2026 資料會比較久</span></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const app = document.getElementById("app");
const info = document.getElementById("info");
const loading = document.getElementById("loading");
const countEl = document.getElementById("count");
const zonesEl = document.getElementById("zones");
const maxMagEl = document.getElementById("maxMag");
const gridInput = document.getElementById("grid");
const gridLabel = document.getElementById("gridLabel");
const bordersToggle = document.getElementById("bordersToggle");
const labelsToggle = document.getElementById("labelsToggle");

window.addEventListener("error", (e) => {
  loading.style.display = "none";
  info.innerHTML = `<div class="empty">程式執行失敗：${e.message}<br>請確認瀏覽器允許載入 jsDelivr、USGS API 與 GeoJSON。</div>`;
});

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x060812, 0.045);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 1.8, 7.2);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 3.0;
controls.maxDistance = 14;
controls.target.set(0,0,0); // 固定旋轉中心為地心

scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(5, 2.5, 4);
scene.add(sun);

const earthGroup = new THREE.Group();
scene.add(earthGroup);

const R = 2.0;

function makeFallbackEarthTexture(){
  const c = document.createElement("canvas");
  c.width = 1024; c.height = 512;
  const ctx = c.getContext("2d");
  const g = ctx.createLinearGradient(0,0,0,c.height);
  g.addColorStop(0,"#0b3d91"); g.addColorStop(.55,"#0b6ea8"); g.addColorStop(1,"#082b62");
  ctx.fillStyle = g; ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = "rgba(68,170,96,.88)";
  const blobs = [
    [170,165,90,55],[260,210,60,35],[480,150,100,45],[560,205,80,50],
    [710,180,130,60],[820,245,80,45],[390,310,130,45],[620,330,100,35]
  ];
  for(const [x,y,w,h] of blobs){ctx.beginPath();ctx.ellipse(x,y,w,h,0,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle = "rgba(255,255,255,.18)";
  for(let x=0;x<c.width;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();}
  for(let y=0;y<c.height;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();}
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(R, 96, 96),
  new THREE.MeshPhongMaterial({
    map: makeFallbackEarthTexture(),
    specular: new THREE.Color(0x335577),
    shininess: 12
  })
);
earthGroup.add(earth);

new THREE.TextureLoader().load(
  "https://cdn.jsdelivr.net/gh/mrdoob/three.js@r164/examples/textures/planets/earth_atmos_2048.jpg",
  tex => { tex.colorSpace = THREE.SRGBColorSpace; earth.material.map = tex; earth.material.needsUpdate = true; }
);

const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(R * 1.018, 96, 96),
  new THREE.MeshBasicMaterial({ color:0x5dade2, transparent:true, opacity:.12, side:THREE.BackSide })
);
earthGroup.add(atmosphere);

const starPositions = [];
for(let i=0;i<1200;i++) starPositions.push((Math.random()-.5)*90, (Math.random()-.5)*90, (Math.random()-.5)*90);
scene.add(new THREE.Points(
  new THREE.BufferGeometry().setAttribute("position", new THREE.Float32BufferAttribute(starPositions, 3)),
  new THREE.PointsMaterial({ color:0xffffff, size:.018, transparent:true, opacity:.65 })
));

const borderGroup = new THREE.Group();
const towerGroup = new THREE.Group();
earthGroup.add(borderGroup);
earthGroup.add(towerGroup);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let quakeFeatures = [];
let clickable = [];
let selectedMesh = null;
let autoSpin = true;

const PLACE_DICT = [
  ["Taiwan", "台灣"], ["Japan", "日本"], ["Philippines", "菲律賓"], ["Indonesia", "印尼"],
  ["Papua New Guinea", "巴布亞紐幾內亞"], ["New Zealand", "紐西蘭"], ["Chile", "智利"],
  ["Alaska", "阿拉斯加"], ["Aleutian Islands", "阿留申群島"], ["California", "加州"],
  ["Mexico", "墨西哥"], ["Peru", "秘魯"], ["Ecuador", "厄瓜多"], ["Russia", "俄羅斯"],
  ["Kuril Islands", "千島群島"], ["Kermadec Islands", "克馬德克群島"], ["Tonga", "東加"],
  ["Fiji", "斐濟"], ["Vanuatu", "萬那杜"], ["Solomon Islands", "索羅門群島"],
  ["South Sandwich Islands", "南桑威奇群島"], ["Turkey", "土耳其"], ["Greece", "希臘"],
  ["Iran", "伊朗"], ["Pakistan", "巴基斯坦"], ["Afghanistan", "阿富汗"], ["China", "中國"],
  ["Haiti", "海地"], ["Guatemala", "瓜地馬拉"], ["Nicaragua", "尼加拉瓜"],
  ["El Salvador", "薩爾瓦多"], ["Costa Rica", "哥斯大黎加"], ["Puerto Rico", "波多黎各"],
  ["Mariana Islands", "馬里亞納群島"], ["Bonin Islands", "小笠原群島"],
  ["Izu Islands", "伊豆群島"], ["Honshu", "本州"], ["Hokkaido", "北海道"],
  ["Kyushu", "九州"], ["Sumatra", "蘇門答臘"], ["Java", "爪哇"], ["Sulawesi", "蘇拉威西"],
  ["Mindanao", "民答那峨"], ["Luzon", "呂宋"], ["Kamchatka", "堪察加"],
  ["Sichuan", "四川"], ["Yunnan", "雲南"], ["Nepal", "尼泊爾"], ["India", "印度"]
];

function translatePlace(place){
  if (!place) return "未知地點";
  let s = place;
  s = s.replace(/(\d+(?:\.\d+)?) km ([NSEW]{1,2}) of /, (_, d, dir) => `${d} 公里${dirToZh(dir)}方，`);
  s = s.replace(/north of /ig, "北方，");
  s = s.replace(/south of /ig, "南方，");
  s = s.replace(/east of /ig, "東方，");
  s = s.replace(/west of /ig, "西方，");
  s = s.replace(/region/ig, "地區");
  s = s.replace(/islands/ig, "群島");
  s = s.replace(/island/ig, "島");
  s = s.replace(/offshore/ig, "外海");
  s = s.replace(/near the coast of/ig, "近海岸，");
  s = s.replace(/off the coast of/ig, "外海，");
  for (const [en, zh] of PLACE_DICT){
    s = s.replace(new RegExp(en, "ig"), zh);
  }
  return s;
}

function dirToZh(dir){
  return ({N:"北",S:"南",E:"東",W:"西",NE:"東北",NW:"西北",SE:"東南",SW:"西南"}[dir] || dir);
}

function latLngToVec3(lat, lng, radius){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
     radius * Math.cos(phi),
     radius * Math.sin(phi) * Math.sin(theta)
  );
}

function magColor(mag){
  if (mag >= 8) return 0xff2d3d;
  if (mag >= 7.5) return 0xff6b35;
  if (mag >= 7) return 0xffa536;
  return 0xffdd68;
}

function clearTowers(){
  clickable = [];
  while(towerGroup.children.length){
    const obj = towerGroup.children.pop();
    obj.traverse?.(m => {
      if (m.geometry) m.geometry.dispose();
      if (m.material) m.material.dispose();
    });
  }
}

function groupQuakes(features, gridSize){
  const map = new Map();
  for (const f of features){
    const [lng, lat, depth] = f.geometry.coordinates;
    const keyLat = Math.round(lat / gridSize) * gridSize;
    const keyLng = Math.round(lng / gridSize) * gridSize;
    const key = `${keyLat.toFixed(1)},${keyLng.toFixed(1)}`;
    if (!map.has(key)) map.set(key, { key, lat:keyLat, lng:keyLng, items:[] });
    map.get(key).items.push({ ...f.properties, lat, lng, depth, url:f.properties.url });
  }
  for (const zone of map.values()) zone.items.sort((a,b) => b.time - a.time);
  return [...map.values()].sort((a,b) => b.items.length - a.items.length);
}

function renderTowers(){
  clearTowers();
  const gridSize = parseFloat(gridInput.value);
  gridLabel.textContent = `${gridSize}°`;
  const zones = groupQuakes(quakeFeatures, gridSize);

  for (const zone of zones){
    const base = latLngToVec3(zone.lat, zone.lng, R * 1.017);
    const normal = base.clone().normalize();

    const baseRing = new THREE.Mesh(
      new THREE.TorusGeometry(0.035 + Math.min(zone.items.length, 24)*0.004, 0.006, 8, 32),
      new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:.34 })
    );
    baseRing.position.copy(base);
    baseRing.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), normal);
    towerGroup.add(baseRing);

    zone.items.forEach((q, idx) => {
      const h = 0.052 + Math.min(q.mag - 6.5, 3) * 0.018;
      const offset = idx * 0.066 + h/2;
      const pos = base.clone().add(normal.clone().multiplyScalar(offset));
      const radius = 0.024 + Math.min(q.mag - 6.5, 3) * 0.007;

      const floor = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, h, 18, 1),
        new THREE.MeshStandardMaterial({
          color: magColor(q.mag),
          emissive: magColor(q.mag),
          emissiveIntensity: .48,
          roughness:.45,
          metalness:.1
        })
      );
      floor.position.copy(pos);
      floor.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), normal);
      floor.userData = { quake:q, zone, floorIndex:idx + 1, floors:zone.items.length };
      clickable.push(floor);
      towerGroup.add(floor);

      const edge = new THREE.Mesh(
        new THREE.TorusGeometry(radius * 1.05, 0.0024, 6, 18),
        new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:.34 })
      );
      edge.position.copy(pos.clone().add(normal.clone().multiplyScalar(h/2 + .002)));
      edge.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), normal);
      towerGroup.add(edge);
    });

    if (zone.items.length >= 2){
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([base, base.clone().add(normal.clone().multiplyScalar(zone.items.length * .066 + .08))]),
        new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:.20 })
      );
      towerGroup.add(line);
    }
  }

  zonesEl.textContent = zones.length;
  const maxMag = quakeFeatures.reduce((m,f)=>Math.max(m, f.properties.mag || 0), 0);
  maxMagEl.textContent = maxMag ? maxMag.toFixed(1) : "—";
  countEl.textContent = quakeFeatures.length;
}

function fmtTime(ms){
  return new Intl.DateTimeFormat("zh-TW", {
    year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit",
    hour12:false
  }).format(new Date(ms));
}

function showQuake(mesh){
  if (selectedMesh) selectedMesh.scale.setScalar(1);
  selectedMesh = mesh;
  selectedMesh.scale.setScalar(1.55);

  const { quake:q, zone, floorIndex, floors } = mesh.userData;
  const cnPlace = translatePlace(q.place);
  const floorButtons = zone.items.map((item, i) => `
    <button class="floorBtn ${i + 1 === floorIndex ? "active" : ""}" data-zone="${zone.key}" data-index="${i}">
      <span>第 ${i + 1} 層｜M${Number(item.mag).toFixed(1)}</span>
      <span>${fmtTime(item.time).slice(0,10)}</span>
    </button>
  `).join("");

  info.innerHTML = `
    <div class="quakeTitle"><span class="badge">M${Number(q.mag).toFixed(1)}</span>${cnPlace}</div>
    <div class="original">原文：${q.place || "Unknown place"}</div>
    <div class="meta">
      <div><b>樓層：</b>第 ${floorIndex} 層 / 共 ${floors} 層（越靠近地表越新）</div>
      <div><b>發生時間：</b>${fmtTime(q.time)}</div>
      <div><b>震源深度：</b>${Number(q.depth).toFixed(1)} 公里</div>
      <div><b>經緯度：</b>${q.lat.toFixed(3)}, ${q.lng.toFixed(3)}</div>
      <div><b>資料來源：</b><a href="${q.url}" target="_blank" rel="noreferrer">開啟 USGS 詳細頁</a></div>
    </div>
    <div class="floors">${floorButtons}</div>
  `;
  info.querySelectorAll(".floorBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const zkey = btn.dataset.zone;
      const index = Number(btn.dataset.index);
      const target = clickable.find(m => m.userData.zone.key === zkey && m.userData.floorIndex === index + 1);
      if (target) showQuake(target);
    });
  });
}

function onPointerDown(e){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickable, false);
  if (hits.length) showQuake(hits[0].object);
  // 重要：不呼叫 controls.target.copy，不改變旋轉中心
}
renderer.domElement.addEventListener("pointerdown", onPointerDown);

function fetchWithTimeout(url, ms=20000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(()=>clearTimeout(t));
}

async function loadBorders(){
  try{
    const url = "https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json";
    const res = await fetchWithTimeout(url, 15000);
    if(!res.ok) throw new Error(`國界 GeoJSON HTTP ${res.status}`);
    const geo = await res.json();

    const material = new THREE.LineBasicMaterial({ color:0xeef3ff, transparent:true, opacity:.28 });
    const addRing = coords => {
      const pts = [];
      for(const [lng, lat] of coords){
        if (Number.isFinite(lat) && Number.isFinite(lng)) pts.push(latLngToVec3(lat, lng, R * 1.022));
      }
      if(pts.length >= 2){
        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), material);
        borderGroup.add(line);
      }
    };

    for(const f of geo.features || []){
      const g = f.geometry;
      if(!g) continue;
      if(g.type === "Polygon"){
        for(const ring of g.coordinates) addRing(ring);
      }else if(g.type === "MultiPolygon"){
        for(const poly of g.coordinates) for(const ring of poly) addRing(ring);
      }
    }
  }catch(err){
    console.warn(err);
    // 國界失敗不阻止地震主功能
  }
}

async function loadData(){
  loading.style.display = "block";
  info.innerHTML = `<div class="empty">正在分批載入 USGS M6.5+ 地震資料，範圍 1999-01-01 至 2026-06-08…</div>`;
  try{
    const start = "1999-01-01";
    const end = "2026-06-08";
    const limit = 20000;
    let offset = 1;
    let all = [];

    while(true){
      loading.innerHTML = `正在載入地震資料…<br><span class="small">已讀取 ${all.length} 筆</span>`;
      const url = `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&minmagnitude=6.5&orderby=time-asc&starttime=${start}&endtime=${end}&limit=${limit}&offset=${offset}`;
      const res = await fetchWithTimeout(url, 30000);
      if (!res.ok) throw new Error(`USGS API 回應 HTTP ${res.status}`);
      const data = await res.json();
      const batch = data.features || [];
      all = all.concat(batch);
      if (batch.length < limit) break;
      offset += limit;
      if (offset > 100000) break;
    }

    quakeFeatures = all
      .filter(f => f.geometry?.coordinates && Number(f.properties?.mag) >= 6.5)
      .sort((a,b) => b.properties.time - a.properties.time);

    renderTowers();
    if (clickable[0]) showQuake(clickable[0]);
    else info.innerHTML = `<div class="empty">查詢區間內沒有 M6.5+ 地震。</div>`;
  }catch(err){
    console.error(err);
    info.innerHTML = `<div class="empty">地震資料載入失敗：${String(err.message || err)}<br><br>常見原因：瀏覽器或公司網路擋掉 USGS API、外部 CDN 被阻擋，或目前網路不穩。</div>`;
  }finally{
    loading.style.display = "none";
  }
}

document.getElementById("reload").addEventListener("click", loadData);
gridInput.addEventListener("input", () => {
  renderTowers();
  if (clickable[0]) showQuake(clickable[0]);
});
document.getElementById("spin").addEventListener("click", (e)=>{
  autoSpin = !autoSpin;
  e.currentTarget.textContent = autoSpin ? "暫停自轉" : "開始自轉";
});
document.getElementById("resetView").addEventListener("click", () => {
  controls.target.set(0,0,0);
  camera.position.set(0,1.8,7.2);
});
bordersToggle.addEventListener("change", () => borderGroup.visible = bordersToggle.checked);
labelsToggle.addEventListener("change", () => towerGroup.visible = labelsToggle.checked);

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  if (autoSpin) earthGroup.rotation.y += 0.00115;
  controls.target.set(0,0,0); // 每一幀鎖回地心，避免任何操作改掉旋轉軸心
  controls.update();
  renderer.render(scene, camera);
}

animate();
await loadBorders();
await loadData();
</script>

document.getElementById("info").innerHTML = '<div class="empty">你的瀏覽器不支援 ES Module。請改用新版 Chrome、Edge、Firefox 或 Safari。</div>';
</script>

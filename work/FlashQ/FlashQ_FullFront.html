<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#090b14" />
<title>閃Q｜完整前台互動原型</title>
<style>
:root{
  --bg:#080a12;
  --bg-2:#0d1020;
  --surface:#111522;
  --surface-2:#171c2d;
  --surface-3:#20263a;
  --line:rgba(255,255,255,.09);
  --line-strong:rgba(255,255,255,.16);
  --text:#f7f8ff;
  --text-2:#c6cada;
  --muted:#7f879f;
  --primary:#7c5cff;
  --primary-2:#5b7cff;
  --cyan:#38d8ff;
  --success:#2dd49a;
  --danger:#ff647c;
  --warning:#ffc857;
  --pink:#ff78c9;
  --shadow:0 28px 80px rgba(0,0,0,.42);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 0%,#182047 0,transparent 28%),radial-gradient(circle at 85% 100%,#1c123a 0,transparent 30%),#05060c;color:var(--text);font-family:var(--font);}
body{min-height:100dvh;overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{color:inherit}
button,a{-webkit-tap-highlight-color:transparent}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.hidden{display:none!important}
.prototype-studio{min-height:100dvh;display:grid;grid-template-columns:minmax(390px,460px) minmax(300px,390px);gap:28px;align-items:center;justify-content:center;padding:32px;}
.phone-frame{width:min(430px,100%);height:min(900px,calc(100dvh - 64px));min-height:720px;border-radius:46px;padding:10px;background:linear-gradient(145deg,#30384f,#080a10 35%,#1a2030);box-shadow:0 50px 130px rgba(0,0,0,.65),inset 0 0 0 1px rgba(255,255,255,.12);position:relative}
.phone-frame:before{content:"";position:absolute;z-index:30;top:17px;left:50%;transform:translateX(-50%);width:112px;height:29px;border-radius:20px;background:#030408;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.app-shell{height:100%;overflow:hidden;position:relative;border-radius:37px;background:var(--bg);display:flex;flex-direction:column;isolation:isolate}
.statusbar{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 24px;font-size:12px;font-weight:700;letter-spacing:.02em;position:relative;z-index:20;flex:0 0 auto;background:linear-gradient(180deg,rgba(4,5,10,.98),rgba(8,10,18,.86))}
.status-icons{display:flex;align-items:center;gap:7px;color:#e8eaf5}
.app-stage{position:relative;flex:1;min-height:0;overflow:hidden;background:var(--bg)}
.screen{height:100%;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:none;padding-bottom:calc(84px + env(safe-area-inset-bottom));background:var(--bg)}
.screen::-webkit-scrollbar{display:none}
.screen.no-tabs{padding-bottom:0}
.topbar{position:sticky;top:0;z-index:16;display:flex;align-items:center;justify-content:space-between;min-height:58px;padding:10px 16px;background:rgba(8,10,18,.84);backdrop-filter:blur(22px);border-bottom:1px solid transparent}
.topbar.scrolled{border-color:var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.04em;font-size:22px}
.brand-mark{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--cyan));box-shadow:0 8px 24px rgba(87,104,255,.34);font-size:19px;color:white;transform:rotate(-3deg)}
.brand small{display:block;font-size:9px;letter-spacing:.13em;color:var(--muted);font-weight:700;margin-top:-2px}
.top-title{font-size:17px;font-weight:800;letter-spacing:-.02em}
.top-sub{font-size:11px;color:var(--muted);margin-top:2px}
.icon-btn{width:42px;height:42px;border:1px solid var(--line);background:rgba(255,255,255,.045);display:grid;place-items:center;border-radius:14px;cursor:pointer;transition:.18s ease;position:relative}
.icon-btn:hover{background:rgba(255,255,255,.09);border-color:var(--line-strong)}
.icon-btn:active{transform:scale(.95)}
.icon-btn .dot{position:absolute;right:7px;top:7px;width:8px;height:8px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 3px var(--bg)}
.svg-icon{width:21px;height:21px;display:block;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.header-actions{display:flex;gap:8px}
.eyebrow{font-size:11px;font-weight:800;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase}
.hero-copy h1,.page-head h1{margin:5px 0 6px;font-size:28px;line-height:1.14;letter-spacing:-.045em}
.hero-copy p,.page-head p{margin:0;color:var(--muted);font-size:13px;line-height:1.65}
.page{padding:16px}
.page-head{margin:4px 0 18px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.032));border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.card + .card{margin-top:12px}
.card-pad{padding:16px}
.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:22px 0 10px}
.section-title h2{margin:0;font-size:15px;letter-spacing:-.02em}
.section-title button{border:0;background:none;color:var(--cyan);font-size:12px;font-weight:700;cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;color:var(--text-2)}
.pill.primary{border-color:rgba(124,92,255,.35);background:rgba(124,92,255,.15);color:#c9bdff}
.pill.success{border-color:rgba(45,212,154,.28);background:rgba(45,212,154,.11);color:#8aefc9}
.pill.warning{border-color:rgba(255,200,87,.28);background:rgba(255,200,87,.11);color:#ffdf9a}
.pill.danger{border-color:rgba(255,100,124,.28);background:rgba(255,100,124,.11);color:#ffb2bf}
.btn{min-height:48px;border:0;border-radius:15px;padding:0 16px;font-weight:800;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.16s ease;text-decoration:none}
.btn:active{transform:scale(.975)}
.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;box-shadow:0 12px 28px rgba(100,91,255,.24)}
.btn.primary:hover{filter:brightness(1.07)}
.btn.secondary{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text-2)}
.btn.danger{background:rgba(255,100,124,.13);border:1px solid rgba(255,100,124,.28);color:#ff9bac}
.btn.full{width:100%}
.btn.small{min-height:38px;padding:0 13px;border-radius:12px;font-size:12px}
.btn[disabled]{opacity:.38;cursor:not-allowed;box-shadow:none}
.link-btn{border:0;background:none;color:var(--cyan);font-weight:700;font-size:12px;cursor:pointer;padding:5px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}
.field label{font-size:12px;color:var(--text-2);font-weight:700}
.field input,.field select{width:100%;height:50px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);padding:0 14px;font-size:14px;transition:.18s ease}
.field input::placeholder{color:#60687e}
.field input:focus,.field select:focus{border-color:rgba(56,216,255,.7);background:rgba(255,255,255,.065)}
.field .error-text{font-size:11px;color:var(--danger);display:none}
.field.error input,.field.error select{border-color:var(--danger)}
.field.error .error-text{display:block}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-row{display:flex;align-items:flex-start;gap:10px;color:var(--muted);font-size:11px;line-height:1.55;margin:8px 0 16px}
.check-row input{margin-top:2px;accent-color:var(--primary);width:17px;height:17px}
.check-row a{color:var(--cyan);text-decoration:none}
.divider{display:flex;align-items:center;gap:12px;color:#60687e;font-size:11px;margin:17px 0}
.divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1}
.social-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.social-btn{height:48px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.045);display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:700;cursor:pointer}
.social-logo{width:23px;height:23px;border-radius:8px;display:grid;place-items:center;font-size:12px;font-weight:900;background:#fff;color:#111}
.social-logo.line{background:#06c755;color:#fff}
.social-logo.apple{background:#fff;color:#000}
.social-logo.google{background:linear-gradient(135deg,#4285f4 0 25%,#34a853 25% 50%,#fbbc05 50% 75%,#ea4335 75%);color:#fff}
.auth-screen{min-height:100%;display:flex;flex-direction:column;background:radial-gradient(circle at 50% -10%,rgba(124,92,255,.34),transparent 38%),var(--bg)}
.auth-hero{padding:35px 24px 18px;text-align:center}
.auth-logo{width:72px;height:72px;border-radius:25px;margin:0 auto 18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--cyan));font-size:36px;box-shadow:0 20px 50px rgba(74,106,255,.34);transform:rotate(-4deg)}
.auth-hero h1{font-size:30px;margin:0 0 6px;letter-spacing:-.05em}
.auth-hero p{margin:0;color:var(--muted);font-size:13px;line-height:1.6}
.auth-panel{margin-top:auto;background:linear-gradient(180deg,#121625,#0d101b);border-radius:30px 30px 0 0;border-top:1px solid var(--line);padding:22px 20px calc(24px + env(safe-area-inset-bottom));}
.auth-note{text-align:center;color:var(--muted);font-size:11px;margin-top:14px}
.auth-note button{border:0;background:none;color:var(--cyan);font-weight:800;cursor:pointer}
.back-btn{position:absolute;top:12px;left:12px;z-index:4}
.quiz-screen{overflow:hidden;padding:0;height:100%;display:flex;flex-direction:column;background:radial-gradient(circle at 100% 0,rgba(56,216,255,.1),transparent 32%),radial-gradient(circle at 0 80%,rgba(124,92,255,.12),transparent 38%),var(--bg)}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px 7px;flex:0 0 auto}
.mode-switch{border:1px solid var(--line);background:rgba(255,255,255,.055);height:38px;border-radius:13px;padding:0 12px;display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;font-weight:800}
.quiz-brand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:900;letter-spacing:-.04em}
.quiz-brand .brand-mark{width:28px;height:28px;border-radius:10px;font-size:15px}
.guest-meter{margin:0 14px 8px;border:1px solid rgba(56,216,255,.16);background:rgba(56,216,255,.06);border-radius:14px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#9deaff;flex:0 0 auto}
.guest-dots{display:flex;gap:5px}
.guest-dots span{width:7px;height:7px;border-radius:50%;background:rgba(56,216,255,.18)}
.guest-dots span.used{background:var(--cyan);box-shadow:0 0 10px rgba(56,216,255,.6)}
.stat-strip{margin:0 14px 8px;padding:9px 10px;display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:15px;flex:0 0 auto}
.stat-item{text-align:center;position:relative}
.stat-item + .stat-item:before{content:"";position:absolute;left:0;top:5px;bottom:5px;width:1px;background:var(--line)}
.stat-item strong{display:block;font-size:15px;letter-spacing:-.03em}
.stat-item span{font-size:9px;color:var(--muted);letter-spacing:.08em}
.quiz-viewport{position:relative;flex:1;min-height:0;overflow:hidden}
.question-scroll{position:absolute;inset:0;overflow-y:auto;scrollbar-width:none;padding:5px 62px 128px 14px}
.question-scroll::-webkit-scrollbar{display:none}
.question-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.subject-badge{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:6px 10px;background:rgba(124,92,255,.14);border:1px solid rgba(124,92,255,.28);font-size:11px;font-weight:800;color:#c7baff}
.q-counter{font-size:11px;color:var(--muted);padding-top:6px}
.question-title{font-size:19px;line-height:1.62;font-weight:760;letter-spacing:-.02em;margin:10px 0 16px;color:#fbfbff}
.question-figure{border:1px solid var(--line);border-radius:18px;padding:15px;background:linear-gradient(180deg,rgba(56,216,255,.08),rgba(124,92,255,.06));margin-bottom:14px}
.mini-formula{display:flex;align-items:center;justify-content:center;gap:16px;font-size:20px;font-family:Georgia,serif;padding:10px;color:#dbf9ff}
.options{display:flex;flex-direction:column;gap:9px}
.option{width:100%;min-height:58px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.042);display:flex;align-items:center;gap:11px;text-align:left;padding:10px 12px;color:var(--text-2);font-size:14px;line-height:1.45;cursor:pointer;transition:.16s ease}
.option:hover{background:rgba(255,255,255,.075);border-color:var(--line-strong)}
.option:active{transform:scale(.985)}
.option-label{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:rgba(124,92,255,.13);color:#bfb0ff;font-weight:900;flex:0 0 auto}
.option.selected{border-color:var(--primary);background:rgba(124,92,255,.13)}
.option.correct{border-color:rgba(45,212,154,.7);background:rgba(45,212,154,.13);color:#d8fff1}
.option.correct .option-label{background:var(--success);color:#051d15}
.option.wrong{border-color:rgba(255,100,124,.72);background:rgba(255,100,124,.13);color:#ffe1e7}
.option.wrong .option-label{background:var(--danger);color:white}
.option[disabled]{cursor:default}
.quick-rail{position:absolute;right:10px;bottom:90px;display:flex;flex-direction:column;gap:11px;z-index:7}
.quick-action{border:0;background:none;padding:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text-2)}
.quick-action .bubble{width:43px;height:43px;border-radius:50%;display:grid;place-items:center;background:rgba(16,20,34,.83);backdrop-filter:blur(12px);border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.24)}
.quick-action .count{font-size:9px;color:var(--muted);font-weight:700}
.quick-action.active.heart .bubble{background:rgba(255,100,124,.18);color:#ff90a2;border-color:rgba(255,100,124,.35)}
.quick-action.active.save .bubble{background:rgba(255,200,87,.16);color:#ffe09b;border-color:rgba(255,200,87,.35)}
.swipe-hint{position:absolute;left:14px;bottom:85px;color:#646d84;font-size:10px;display:flex;align-items:center;gap:5px;z-index:5}
.answer-sheet{position:absolute;left:8px;right:8px;bottom:78px;z-index:10;background:rgba(18,22,37,.98);backdrop-filter:blur(24px);border-top:1px solid var(--line-strong);border-radius:26px;padding:12px 16px 13px;box-shadow:0 -25px 60px rgba(0,0,0,.48);animation:sheetUp .25s ease}
@keyframes sheetUp{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{width:38px;height:4px;border-radius:999px;background:rgba(255,255,255,.17);margin:0 auto 10px}
.answer-status{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:900;margin-bottom:5px}
.answer-status.ok{color:#86efc8}.answer-status.ng{color:#ff9cad}
.answer-copy{font-size:12px;line-height:1.58;color:var(--text-2);max-height:75px;overflow:auto;margin-bottom:10px}
.knowledge-row{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0 11px}
.answer-actions{display:grid;grid-template-columns:.82fr 1.18fr;gap:8px}
.tabbar{position:absolute;z-index:18;left:8px;right:8px;bottom:8px;bottom:max(8px,env(safe-area-inset-bottom));height:68px;border:1px solid var(--line);background:rgba(15,18,30,.94);backdrop-filter:blur(22px);border-radius:22px;display:grid;grid-template-columns:repeat(5,1fr);box-shadow:0 18px 50px rgba(0,0,0,.46)}
.tab-item{border:0;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#6f778f;font-size:9px;font-weight:700;cursor:pointer;position:relative}
.tab-item .svg-icon{width:21px;height:21px}
.tab-item.active{color:#d6ceff}
.tab-item.active:before{content:"";position:absolute;top:5px;width:28px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--cyan));box-shadow:0 0 18px rgba(124,92,255,.7)}
.tab-item .lock{position:absolute;right:14px;top:11px;font-size:8px}
.mode-cards{display:grid;gap:11px}
.mode-card{padding:16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:.16s ease}
.mode-card:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.mode-icon{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;font-size:23px;flex:0 0 auto}
.mode-icon.purple{background:rgba(124,92,255,.17);color:#c7baff}
.mode-icon.cyan{background:rgba(56,216,255,.14);color:#a3efff}
.mode-icon.yellow{background:rgba(255,200,87,.14);color:#ffe19f}
.mode-content{flex:1}
.mode-content h3{font-size:15px;margin:0 0 4px}
.mode-content p{font-size:11px;color:var(--muted);margin:0;line-height:1.45}
.mode-chevron{color:#616a82}
.sticky-cta{position:sticky;bottom:0;margin:14px -16px -16px;padding:12px 16px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,rgba(8,10,18,.96) 18%);z-index:8}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{min-height:38px;border-radius:999px;padding:0 13px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text-2);font-size:12px;font-weight:700;cursor:pointer}
.chip.active{background:rgba(124,92,255,.18);border-color:rgba(124,92,255,.54);color:#d9d2ff}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input{width:100%;accent-color:var(--primary)}
.range-value{width:54px;height:42px;border-radius:13px;display:grid;place-items:center;background:rgba(124,92,255,.16);font-weight:900;color:#d8d0ff}
.summary-card{padding:18px;background:linear-gradient(135deg,rgba(124,92,255,.18),rgba(56,216,255,.08));border-color:rgba(124,92,255,.25)}
.summary-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.score-ring{width:104px;height:104px;border-radius:50%;background:conic-gradient(var(--success) var(--score,78%),rgba(255,255,255,.08) 0);display:grid;place-items:center;position:relative;flex:0 0 auto}
.score-ring:after{content:"";position:absolute;inset:10px;border-radius:50%;background:#141828}
.score-ring div{position:relative;z-index:2;text-align:center}
.score-ring strong{font-size:26px;display:block;line-height:1}.score-ring span{font-size:10px;color:var(--muted)}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}
.metric{border-radius:14px;background:rgba(255,255,255,.045);border:1px solid var(--line);padding:10px;text-align:center}
.metric strong{display:block;font-size:18px}.metric span{font-size:9px;color:var(--muted)}
.review-list{display:flex;flex-direction:column;gap:9px}
.review-item{display:flex;align-items:center;gap:11px;padding:12px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.035)}
.review-num{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.065);font-weight:900;font-size:12px}
.review-num.ok{color:#8cf1cb;background:rgba(45,212,154,.13)}.review-num.ng{color:#ff9cad;background:rgba(255,100,124,.13)}
.review-copy{min-width:0;flex:1}.review-copy strong{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.review-copy span{font-size:10px;color:var(--muted)}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.filter-card{padding:14px;min-height:112px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:.17s ease}
.filter-card:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.filter-card .top{display:flex;justify-content:space-between}.filter-card h3{font-size:13px;margin:0}.filter-card p{font-size:10px;color:var(--muted);margin:4px 0 0;line-height:1.4}.filter-card strong{font-size:23px;letter-spacing:-.04em}
.progress-bar{height:7px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}.progress-bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--primary),var(--cyan))}
.mistake-list{display:flex;flex-direction:column;gap:10px}
.mistake-card{padding:14px}
.mistake-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:9px}.mistake-head .tags{display:flex;gap:5px;flex-wrap:wrap}.mistake-title{font-size:13px;line-height:1.55;margin:0 0 12px;color:var(--text-2)}

<body>
<div class="prototype-studio">
  <div class="phone-frame">
    <main class="app-shell" id="app" aria-live="polite"></main>
  </div>
  <aside class="prototype-panel" aria-label="原型操作面板">
    <div class="proto-head">
      <div class="brand-mark">⚡</div>
      <div><h1>閃Q 前台 UI 原型</h1><p>Mobile-first · Single-file HTML · 可完整操作</p></div>
    </div>
    <div class="proto-note">這份原型將登入、訪客額度、極速刷題、自選測驗、錯題本、學習儀表板、兌換碼、學習紀錄與成績卡片整理成同一套前台體驗。右側按鈕可快速跳到各狀態，方便美術拆成 Figma Frame。</div>
    <section class="proto-section">
      <h2>使用者狀態</h2>
      <div class="proto-buttons">
        <button class="proto-btn active" data-proto="guest">訪客模式</button>
        <button class="proto-btn" data-proto="member">已登入會員</button>
        <button class="proto-btn" data-proto="quota">訪客額度用盡</button>
        <button class="proto-btn" data-proto="reset">重設原型</button>
      </div>
    </section>
    <section class="proto-section">
      <h2>主要畫面</h2>
      <div class="screen-map">
        <button data-jump="quiz"><strong>01 極速刷題</strong><span>Tab 1</span></button>
        <button data-jump="select"><strong>02 自選測驗</strong><span>Tab 2</span></button>
        <button data-jump="mistakes"><strong>03 錯題本</strong><span>Tab 3</span></button>
        <button data-jump="dashboard"><strong>04 個人儀表板</strong><span>Tab 4</span></button>
        <button data-jump="records"><strong>05 學習紀錄</strong><span>Tab 5</span></button>
        <button data-jump="login"><strong>06 登入／註冊</strong><span>Auth</span></button>
        <button data-jump="result"><strong>07 測驗結果</strong><span>Result</span></button>
        <button data-jump="scorecard"><strong>08 成績卡片</strong><span>Share</span></button>
      </div>
    </section>
    <section class="proto-section">
      <h2>狀態模擬</h2>
      <div class="proto-buttons">
        <button class="proto-btn" data-state="announcement">公告 Banner</button>
        <button class="proto-btn" data-state="offline">離線提示</button>
        <button class="proto-btn" data-state="update">強制更新</button>
        <button class="proto-btn" data-state="empty">空狀態</button>
      </div>
    </section>
    <section class="proto-section">
      <h2>設計色票</h2>
      <div class="token-grid">
        <div class="token" style="background:#7c5cff">Primary</div>
        <div class="token" style="background:#38d8ff;color:#071019">Cyan</div>
        <div class="token" style="background:#2dd49a;color:#07150f">Success</div>
        <div class="token" style="background:#ff647c">Danger</div>
      </div>
    </section>
  </aside>
</div>

function selectScreen(){return `<section class="screen">${topbar('自選測驗','依照目標與範圍建立專屬題組',{action:`<button class="icon-btn" data-action="openPrototype">${icon('more')}</button>`})}<div class="page"><div class="page-head"><span class="eyebrow">Build your quiz</span><h1>今天想練什麼？</h1><p>選擇考試模式、科目與章節，系統會從題庫組出適合你的題目。</p></div><div class="mode-cards"><div class="card mode-card" data-action="chooseMode" data-mode="段考選題"><div class="mode-icon purple">🗂️</div><div class="mode-content"><h3>段考選題</h3><p>依年級、冊次與學校進度挑選範圍。</p></div><span class="mode-chevron">${icon('chevron')}</span></div><div class="card mode-card" data-action="chooseMode" data-mode="學測模式"><div class="mode-icon cyan">🎯</div><div class="mode-content"><h3>學測模式</h3><p>依考科與歷屆範圍，進行限時模擬。</p></div><span class="mode-chevron">${icon('chevron')}</span></div><div class="card mode-card" data-action="randomQuiz"><div class="mode-icon yellow">🎲</div><div class="mode-content"><h3>全隨機挑戰</h3><p>跨科、跨章節快速檢查整體熟悉度。</p></div><span class="mode-chevron">${icon('chevron')}</span></div></div><div class="section-title"><h2>上次使用</h2><button data-action="chooseMode" data-mode="段考選題">再次建立</button></div><div class="card card-pad"><div style="display:flex;align-items:center;justify-content:space-between"><div><strong style="font-size:13px">數學 · 第一冊 1–3 章</strong><p style="font-size:10px;color:var(--muted);margin:4px 0 0">10 題 · 約 8 分鐘</p></div><button class="btn small primary" data-action="startLastQuiz">開始</button></div></div></div>${tabBar()}</section>`}
function selectionScreen(){const s=state.selection;const subjects=['國文','英文','數學','物理','化學','生物','歷史','地理'];const scopes=s.mode==='學測模式'?['國文考科','英文考科','數學 A','數學 B','自然','社會']:['第一冊','第二冊','第三冊','第四冊','第一章','第二章','第三章','第四章'];return `<section class="screen">${topbar(s.mode,'設定出題範圍',{back:true})}<div class="page"><div class="section-title"><h2>選擇科目</h2><span class="pill primary">單選</span></div><div class="chip-group">${subjects.map(x=>`<button class="chip ${s.subject===x?'active':''}" data-action="selectSubject" data-value="${x}">${x}</button>`).join('')}</div><div class="section-title"><h2>${s.mode==='學測模式'?'考試範圍':'冊次與章節'}</h2><span class="pill">可複選</span></div><div class="chip-group">${scopes.map(x=>`<button class="chip ${s.scope.includes(x)?'active':''}" data-action="toggleScope" data-value="${x}">${x}</button>`).join('')}</div><div class="section-title"><h2>題目數量</h2><span class="pill success">約 ${Math.ceil(s.count*.8)} 分鐘</span></div><div class="card card-pad"><div class="range-row"><input id="questionCount" type="range" min="5" max="30" step="5" value="${s.count}" data-action="rangeCount"><div class="range-value">${s.count}</div></div><div style="display:flex;justify-content:space-between;color:var(--muted);font-size:9px;margin-top:8px"><span>5 題</span><span>30 題</span></div></div><div class="section-title"><h2>本次設定</h2></div><div class="card card-pad"><div style="display:flex;justify-content:space-between;gap:12px"><div><span class="pill primary">${s.mode}</span><h3 style="font-size:15px;margin:12px 0 5px">${s.subject} · ${s.scope.join('、')||'未選範圍'}</h3><p style="color:var(--muted);font-size:10px;margin:0">完成後自動加入學習紀錄，答錯題目同步至錯題本。</p></div><strong style="font-size:28px">${s.count}</strong></div></div><div class="sticky-cta"><button class="btn primary full" data-action="startCustomQuiz" ${s.scope.length?'':'disabled'}>開始測驗 ${icon('chevron')}</button></div></div>${tabBar()}</section>`}
function resultScreen(type='exam'){const total=state.quizAnswered||10,correct=state.quizCorrect||8,rate=Math.round(correct/total*100),title=type==='mistake'?'錯題攻克完成':'測驗完成';return `<section class="screen">${topbar(title,type==='mistake'?'已同步更新攻克狀態':'答錯題目已自動加入錯題本')}<div class="page"><div class="summary-card card"><div class="summary-top"><div><span class="eyebrow">${rate>=80?'Great work':'Keep going'}</span><h1 style="font-size:25px;margin:7px 0 7px">${rate>=80?'這次表現很不錯！':'已經找到下一步了'}</h1><p style="font-size:11px;color:var(--muted);line-height:1.55;margin:0">${type==='mistake'?`本次攻克 ${state.mistakeConquered||2} 題，未攻克題目會保留在錯題本。`:'建議優先複習錯誤題目的知識點，再挑戰一次。'}</p></div><div class="score-ring" style="--score:${rate}%"><div><strong>${rate}</strong><span>正確率</span></div></div></div><div class="metric-grid"><div class="metric"><strong>${correct}</strong><span>答對</span></div><div class="metric"><strong>${total-correct}</strong><span>答錯</span></div><div class="metric"><strong>${state.maxStreak||5}</strong><span>最高連答</span></div></div></div><div class="section-title"><h2>作答摘要</h2><button data-action="reviewWrong">只看錯題</button></div><div class="review-list">${Array.from({length:Math.min(total,8)},(_,i)=>{const ok=i%4!==2;return `<div class="review-item"><div class="review-num ${ok?'ok':'ng'}">${i+1}</div><div class="review-copy"><strong>${QUESTIONS[i%QUESTIONS.length].text}</strong><span>${QUESTIONS[i%QUESTIONS.length].subject} · ${ok?'答對':'答錯，建議複習'}</span></div>${icon('chevron')}</div>`}).join('')}</div><div style="display:grid;grid-template-columns:1fr 1.25fr;gap:8px;margin-top:16px"><button class="btn secondary" data-action="resultBack">返回</button><button class="btn primary" data-action="retryQuiz">${type==='mistake'?'再刷未攻克':'重做錯題'}</button></div></div>${tabBar()}</section>`}
function mistakesScreen(){const unconquered=MISTAKES.filter(m=>!m.conquered).length;return `<section class="screen">${topbar('錯題本','把不會的，變成真的會',{action:`<button class="icon-btn" data-action="filterMistakes">${icon('filter')}</button>`})}<div class="page"><div class="summary-card card"><div style="display:flex;justify-content:space-between;align-items:center"><div><span class="eyebrow">Mistake mastery</span><h1 style="font-size:26px;margin:6px 0">尚有 ${unconquered} 題待攻克</h1><p style="font-size:10px;color:var(--muted);margin:0">本週已攻克 6 題，比上週多 2 題。</p></div><div style="font-size:48px">⚔️</div></div><div class="progress-bar" style="margin-top:15px"><i style="width:${Math.round((MISTAKES.length-unconquered)/MISTAKES.length*100)}%"></i></div></div><div class="section-title"><h2>選擇刷題方式</h2><span class="pill">共 ${MISTAKES.length} 題</span></div><div class="filter-grid"><div class="card filter-card" data-action="mistakeList" data-filter="全部錯題"><div class="top"><span class="pill danger">未攻克</span><span>›</span></div><div><strong>${unconquered}</strong><p>只刷目前尚未攻克的題目</p></div></div><div class="card filter-card" data-action="mistakeList" data-filter="依科目"><div class="top"><span class="pill primary">科目</span><span>›</span></div><div><strong>7</strong><p>國英數、自然、社會分科練習</p></div></div><div class="card filter-card" data-action="mistakeList" data-filter="段考範圍"><div class="top"><span class="pill warning">段考</span><span>›</span></div><div><strong>3</strong><p>依學期與段考進度篩選</p></div></div><div class="card filter-card" data-action="mistakeList" data-filter="收藏題目"><div class="top"><span class="pill success">收藏</span><span>›</span></div><div><strong>${state.saved.size}</strong><p>從收藏題目中挑出曾答錯項目</p></div></div></div><div class="section-title"><h2>最近錯題</h2><button data-action="mistakeList" data-filter="全部錯題">查看全部</button></div>${mistakeCards(MISTAKES.slice(0,3))}</div>${tabBar()}</section>`}
function mistakeCards(items){return `<div class="mistake-list">${items.map(m=>{const q=QUESTIONS.find(q=>q.id===m.qid);return `<div class="card mistake-card" data-action="mistakeDetail" data-qid="${m.qid}"><div class="mistake-head"><div class="tags"><span class="pill">${q.subject}</span><span class="pill ${m.conquered?'success':'danger'}">${m.conquered?'已攻克':'未攻克'}</span></div><span style="color:var(--muted)">${icon('chevron')}</span></div><p class="mistake-title">${q.text}</p><div class="mistake-meta"><div><span>答錯 ${m.errors} 次</span><span>${m.source}</span></div><span><i class="status-dot ${m.conquered?'ok':'ng'}"></i>${m.last}</span></div></div>`}).join('')}</div>`}
function mistakeListScreen(){let list=MISTAKES;if(state.mistakeFilter==='全部錯題')list=MISTAKES.filter(m=>!m.conquered);if(state.mistakeFilter==='收藏題目')list=MISTAKES.filter(m=>state.saved.has(m.qid));return `<section class="screen">${topbar(state.mistakeFilter,`符合條件 ${list.length} 題`,{back:true,action:`<button class="icon-btn" data-action="filterMistakes">${icon('filter')}</button>`})}<div class="page"><div class="chip-group" style="margin-bottom:14px">${['全部錯題','依科目','段考範圍','收藏題目'].map(x=>`<button class="chip ${state.mistakeFilter===x?'active':''}" data-action="setMistakeFilter" data-value="${x}">${x}</button>`).join('')}</div>${state.emptyMode?emptyState('錯題本目前是空的','持續刷題後，答錯的題目會自動集中在這裡。','開始刷題','quiz'):mistakeCards(list)}${list.length&&!state.emptyMode?`<div class="sticky-cta"><button class="btn primary full" data-action="startMistakeQuiz">開始攻克 ${list.length} 題 ${icon('chevron')}</button></div>`:''}</div>${tabBar()}</section>`}
function mistakeDetailScreen(){const q=QUESTIONS.find(q=>q.id===state.detailQid)||QUESTIONS[2],m=MISTAKES.find(m=>m.qid===q.id);return `<section class="screen">${topbar('錯題詳情',`${q.subject} · ${q.unit}`,{back:true})}<div class="page"><div class="card card-pad"><div style="display:flex;gap:7px;flex-wrap:wrap"><span class="pill">${q.level}</span><span class="pill ${m?.conquered?'success':'danger'}">${m?.conquered?'已攻克':'答錯 '+(m?.errors||1)+' 次'}</span></div><h1 style="font-size:19px;line-height:1.6;margin:14px 0">${q.text}</h1>${q.options.map((o,i)=>`<div class="option ${i===q.answer?'correct':''}" style="margin-top:8px"><span class="option-label">${String.fromCharCode(65+i)}</span>${o}</div>`).join('')}</div><div class="section-title"><h2>解析與知識點</h2></div><div class="card card-pad"><p style="font-size:12px;line-height:1.7;color:var(--text-2);margin:0 0 12px">${q.explanation}</p><div class="chip-group">${q.knowledge.map(k=>`<span class="pill">${k}</span>`).join('')}</div></div><div style="display:grid;grid-template-columns:.75fr 1.25fr;gap:8px;margin-top:14px"><button class="btn secondary" data-action="removeMistake">移除</button><button class="btn primary" data-action="singleMistakeQuiz">再次挑戰</button></div></div>${tabBar()}</section>`}
function dashboardScreen(){return `<section class="screen">${topbar('我的學習','掌握進度，找到下一個突破點',{action:`<button class="icon-btn" data-action="notifications">${icon('bell')}<span class="dot"></span></button>`})}<div class="page"><div class="profile-hero card"><div class="profile-row"><div class="avatar">J</div><div class="profile-copy"><h2>${state.profile.name}</h2><p>${state.profile.school} · ${state.profile.grade}</p></div><button class="icon-btn" data-action="editProfile">${icon('edit')}</button></div><div class="metric-grid"><div class="metric"><strong>1,248</strong><span>累計作答</span></div><div class="metric"><strong>76%</strong><span>整體正確率</span></div><div class="metric"><strong>18</strong><span>最高連答</span></div></div></div><div class="section-title"><h2>本週學習</h2><span class="pill success">↑ 18%</span></div><div class="card chart-card"><div class="chart-head"><div><strong>86</strong><span> 題</span></div><span>7/14 — 7/20</span></div>${lineChart()}</div><div class="section-title"><h2>科目強弱分析</h2><button data-action="showSubjectDetail">查看詳情</button></div><div class="card card-pad"><div class="subject-list">${[['數學',82],['英文',74],['國文',88],['自然',63],['社會',79]].map(([s,v])=>`<div class="subject-row"><span>${s}</span><div class="progress-bar"><i style="width:${v}%"></i></div><strong>${v}%</strong></div>`).join('')}</div></div><div class="section-title"><h2>題庫方案</h2></div><div class="card plan-card"><div class="plan-badge">${icon('crown')}</div><div class="plan-copy"><h3>免費方案</h3><p>基礎題庫可用；升級後解鎖進階與時事題庫。</p></div><button class="btn small primary" data-action="upgrade">升級</button></div><div class="section-title"><h2>帳號與服務</h2></div><div class="card menu-list">${menuRow('gift','兌換碼','輸入校園或活動推薦碼','redeem')}${menuRow('edit','編輯個人資料','學校、年級與基本資料','editProfile')}${menuRow('shield','隱私權政策','查看資料蒐集與使用方式','privacy')}${menuRow('book','服務條款','查看平台使用規範','terms')}${menuRow('logout','登出','回到訪客刷題模式','logout')}${menuRow('trash','停用帳號','依 LTrust 帳號規範辦理','deactivate',true)}</div></div>${tabBar()}</section>`}
function lineChart(){return `<svg class="line-chart" viewBox="0 0 330 126" role="img" aria-label="一週作答題數折線圖"><defs><linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c5cff" stop-opacity=".34"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></linearGradient><linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#38d8ff"/></linearGradient></defs><path class="grid" d="M0 25H330M0 65H330M0 105H330"/><path class="area" d="M0 96 C30 94 40 78 55 80 S92 52 110 63 S143 83 165 55 S203 29 220 44 S255 69 275 35 S310 21 330 18 L330 126 L0 126 Z"/><path class="line" d="M0 96 C30 94 40 78 55 80 S92 52 110 63 S143 83 165 55 S203 29 220 44 S255 69 275 35 S310 21 330 18"/><circle class="point" cx="275" cy="35" r="4"/></svg>`}
function menuRow(ic,title,sub,action,danger=false){return `<button class="menu-row ${danger?'danger-row':''}" data-action="${action}"><span class="menu-icon">${icon(ic)}</span><span class="menu-copy"><strong>${title}</strong><span>${sub}</span></span><span class="menu-arrow">${icon('chevron')}</span></button>`}
function redeemScreen(){return `<section class="screen">${topbar('兌換碼','兌換由 LTrust 官網完成',{back:true})}<div class="page"><div class="summary-card card"><div style="font-size:42px;margin-bottom:8px">🎁</div><h1 style="font-size:24px;margin:0 0 6px">領取你的學習好禮</h1><p style="font-size:11px;color:var(--muted);line-height:1.65;margin:0">輸入校園、活動或業務提供的推薦碼。確認後會帶碼前往 LTrust，完成兌換並將權益加入帳號。</p></div><div class="section-title"><h2>輸入兌換碼</h2></div><div class="field"><label>推薦碼</label><input id="redeemInput" maxlength="20" placeholder="例如 FLASH2026" value="${state.redeemCode}"></div><button class="btn primary full" data-action="submitRedeem">確認並前往 LTrust ${icon('external')}</button><div class="section-title"><h2>本次活動贈品</h2></div><div class="card plan-card"><div class="plan-badge">10</div><div class="plan-copy"><h3>S.E.N.S.E.I 學習診斷 10 題</h3><p>不分科題數，兌換完成後直接加入 LTrust 帳號。</p></div></div><div class="card card-pad" style="margin-top:12px"><strong style="font-size:12px">兌換說明</strong><ol style="font-size:10px;color:var(--muted);line-height:1.8;padding-left:18px;margin-bottom:0"><li>閃Q App 不直接驗證兌換碼。</li><li>將帶著推薦碼開啟 LTrust 官方頁面。</li><li>登入相同帳號後，即可確認與領取權益。</li></ol></div></div>${tabBar()}</section>`}
function editProfileScreen(){const p=state.profile;return `<section class="screen">${topbar('編輯個人資料','Email 為帳號識別，不可修改',{back:true})}<div class="page"><div class="field"><label>顯示名稱</label><input id="profileName" value="${p.name}"></div><div class="field"><label>Email</label><input value="${p.email}" disabled></div><div class="field"><label>就讀高中</label><input id="profileSchool" value="${p.school}"></div><div class="field-row"><div class="field"><label>年級</label><select id="profileGrade"><option ${p.grade==='高一'?'selected':''}>高一</option><option ${p.grade==='高二'?'selected':''}>高二</option><option ${p.grade==='高三'?'selected':''}>高三</option></select></div><div class="field"><label>性別</label><select id="profileGender"><option ${p.gender==='男'?'selected':''}>男</option><option ${p.gender==='女'?'selected':''}>女</option></select></div></div><button class="btn primary full" data-action="saveProfile">儲存變更</button></div>${tabBar()}</section>`}
function recordsScreen(){const filters=['全部','極速','段考','學測','錯題'];let items=RECORDS;if(state.recordFilter!=='全部')items=RECORDS.filter(r=>r.mode===state.recordFilter);return `<section class="screen">${topbar('學習紀錄','每趟作答自動儲存，可重新挑戰',{action:`<button class="icon-btn" data-action="openPrototype">${icon('more')}</button>`})}<div class="page"><div class="chip-group" style="margin-bottom:14px">${filters.map(x=>`<button class="chip ${state.recordFilter===x?'active':''}" data-action="recordFilter" data-value="${x}">${x}</button>`).join('')}</div>${state.emptyMode?emptyState('還沒有學習紀錄','完成至少 1 題並離開刷題模式後，系統會自動建立紀錄。','開始第一趟刷題','quiz'):`<div class="record-list">${items.map(recordCard).join('')}</div>`}</div>${tabBar()}</section>`}
function recordCard(r){const rate=Math.round(r.correct/r.total*100);return `<div class="card record-card" data-action="recordDetail" data-id="${r.id}"><div class="record-top"><div class="record-icon">${icon(r.mode==='錯題'?'book':r.mode==='極速'?'flame':'layers')}</div><div class="record-copy"><h3>${r.title}</h3><p>${r.date} · ${r.duration}</p></div><div class="record-rate" style="color:${rate>=80?'#86efc8':rate>=60?'#ffdc91':'#ff9cad'}">${rate}%</div></div><div class="record-foot"><span>${r.total} 題 / 答對 ${r.correct}</span><span>最高連答 ${r.maxStreak}</span><span>${r.subject}</span></div></div>`}
function recordDetailScreen(){const r=state.currentRecord||RECORDS[0],rate=Math.round(r.correct/r.total*100);return `<section class="screen">${topbar('紀錄詳情',r.date,{back:true,action:`<button class="icon-btn" data-action="shareRecord">${icon('share')}</button>`})}<div class="page"><div class="summary-card card"><span class="pill primary">${r.mode}</span><h1 style="font-size:25px;margin:12px 0 4px">${r.title}</h1><p style="font-size:10px;color:var(--muted);margin:0">${r.duration} · ${r.subject}</p><div class="metric-grid"><div class="metric"><strong>${rate}%</strong><span>正確率</span></div><div class="metric"><strong>${r.correct}/${r.total}</strong><span>答對題數</span></div><div class="metric"><strong>${r.maxStreak}</strong><span>最高連答</span></div></div></div><button class="btn primary full" style="margin-top:12px" data-action="scorecard">${icon('spark')} 分享成績卡片</button><div class="section-title"><h2>每題作答</h2><button data-action="challengeRecord">重新挑戰</button></div><div class="review-list">${r.answers.map((ok,i)=>`<div class="review-item"><div class="review-num ${ok?'ok':'ng'}">${i+1}</div><div class="review-copy"><strong>${QUESTIONS[i%QUESTIONS.length].text}</strong><span>${ok?'答對':'答錯'} · 用時 ${8+i*2} 秒</span></div>${icon('chevron')}</div>`).join('')}</div></div>${tabBar()}</section>`}
function scorecardScreen(){const r=state.currentRecord||RECORDS[0],rate=Math.round(r.correct/r.total*100);return `<section class="screen">${topbar('成績卡片預覽','圖片由裝置本機生成，離線也可分享',{back:true})}<div class="page"><div class="score-card-preview"><div class="score-card-brand"><div class="brand-mark">⚡</div>閃Q</div><div class="score-card-main"><div class="label">ACCURACY SCORE</div><div class="big">${rate}<span style="font-size:26px">%</span></div><h3>${rate>=80?'今天的我，答得漂亮。':'每一題錯誤，都是下一次答對的提示。'}</h3><div class="score-card-stats"><div class="score-card-stat"><strong>${r.total}</strong><span>作答題數</span></div><div class="score-card-stat"><strong>${r.correct}</strong><span>答對題數</span></div>${r.maxStreak?`<div class="score-card-stat"><strong>${r.maxStreak}</strong><span>最高連答</span></div>`:''}</div></div><div class="score-card-foot"><div><strong>${r.title}</strong><br>${r.date}</div><div class="qr-fake"></div></div></div><p style="font-size:10px;color:var(--muted);line-height:1.6;text-align:center">成績卡片不包含姓名、學校或其他個人識別資料。</p><button class="btn primary full" data-action="nativeShare">${icon('share')} 開啟分享選單</button></div></section>`}
function emptyState(title,copy,cta,target){return `<div class="empty-state"><div class="empty-icon">${icon('book')}</div><h3>${title}</h3><p>${copy}</p><button class="btn small primary" data-action="emptyCta" data-target="${target}">${cta}</button></div>`}
function renderScreen(){switch(state.route){case'login':return authScreen();case'select':return selectScreen();case'selection':return selectionScreen();case'examResult':return resultScreen('exam');case'mistakes':return mistakesScreen();case'mistakeList':return mistakeListScreen();case'mistakeDetail':return mistakeDetailScreen();case'mistakeResult':return resultScreen('mistake');case'dashboard':return dashboardScreen();case'redeem':return redeemScreen();case'editProfile':return editProfileScreen();case'records':return recordsScreen();case'recordDetail':return recordDetailScreen();case'scorecard':return scorecardScreen();default:return quizScreen()}}
function modalLayer(){if(state.forceUpdate)return `<div class="overlay center"><div class="modal"><div class="modal-icon">⬆️</div><h2>需要更新閃Q</h2><p>此版本已停止支援。請更新至最新版本，才能繼續同步題目與學習紀錄。</p><div class="modal-actions"><button class="btn primary full" data-action="clearUpdate">前往更新</button></div></div></div>`;if(state.offline)return `<div class="overlay center"><div class="modal"><div class="modal-icon">${icon('wifiOff')}</div><h2>目前無法連線</h2><p>你仍可瀏覽已載入的題目；作答紀錄會在恢復連線後自動同步。</p><div class="modal-actions"><button class="btn primary full" data-action="clearOffline">重新連線</button><button class="btn secondary full" data-action="offlineContinue">繼續離線使用</button></div></div></div>`;if(!state.modal)return '';
 if(state.modal==='quota')return `<div class="overlay center"><div class="modal"><div class="modal-icon">⏳</div><h2>今日試用額度已用盡</h2><p>訪客每日可體驗 3 題，明日 00:00（臺灣時間）會自動重置。登入後即可無限刷題並同步錯題。</p><div class="modal-actions"><button class="btn primary full" data-action="modalLogin">登入／註冊</button><button class="btn secondary full" data-action="closeModal">先留在這裡</button></div></div></div>`;
 if(state.modal==='loginRequired')return `<div class="overlay center"><div class="modal"><div class="modal-icon">${icon('lock')}</div><h2>登入後才能使用</h2><p>登入後可使用自選測驗、錯題本、學習分析、學習紀錄與跨裝置同步。</p><div class="modal-actions"><button class="btn primary full" data-action="modalLogin">登入／註冊</button><button class="btn secondary full" data-action="closeModal">返回極速刷題</button></div></div></div>`;
 if(state.modal==='deactivate')return `<div class="overlay center"><div class="modal"><div class="modal-icon" style="background:rgba(255,100,124,.12);color:#ff9cad">${icon('trash')}</div><h2>確定要停用帳號？</h2><p>停用後會立即登出，並依 LTrust 現行帳號流程停止服務。此原型不會真的刪除資料。</p><div class="modal-actions"><button class="btn danger full" data-action="confirmDeactivate">停用帳號</button><button class="btn secondary full" data-action="closeModal">取消</button></div></div></div>`;
 if(state.modal==='redeem')return `<div class="overlay center"><div class="modal"><div class="modal-icon">${icon('external')}</div><h2>即將前往 LTrust</h2><p>推薦碼 <strong style="color:var(--text)">${state.redeemCode}</strong> 將一併帶入。請在 LTrust 網站登入相同帳號完成兌換。</p><div class="modal-actions"><button class="btn primary full" data-action="goLTrust">繼續前往</button><button class="btn secondary full" data-action="closeModal">取消</button></div></div></div>`;
 return ''}
function sheetLayer(){if(!state.sheet)return '';
 if(state.sheet==='modes')return `<div class="overlay"><div class="bottom-sheet"><div class="sheet-handle"></div><div class="sheet-title"><div><h2>切換刷題模式</h2><p>已答 1 題以上再切換，會儲存為一筆 Session。</p></div><button class="icon-btn" data-action="closeSheet">${icon('close')}</button></div><div class="sheet-options"><button class="sheet-option active" data-action="modeSpeed"><div class="icon">⚡</div><strong>極速刷題</strong><span>智慧隨機，打開即答</span></button><button class="sheet-option" data-action="modeDaily"><div class="icon">☀️</div><strong>每日精選</strong><span>今日重點題目</span></button><button class="sheet-option" data-action="modeCustom"><div class="icon">🗂️</div><strong>自選測驗</strong><span>段考、學測、全隨機</span></button><button class="sheet-option" data-action="modeMistake"><div class="icon">⚔️</div><strong>錯題攻克</strong><span>只刷尚未掌握的題目</span></button></div></div></div>`;
 if(state.sheet==='more')return `<div class="overlay"><div class="bottom-sheet"><div class="sheet-handle"></div><div class="sheet-title"><div><h2>題目操作</h2><p>${currentQuestion().id} · ${currentQuestion().subject}</p></div><button class="icon-btn" data-action="closeSheet">${icon('close')}</button></div><div class="card menu-list">${menuRow('info','回報題目問題','題幹、答案或解析異常','reportQuestion')}${menuRow('eye','稍後再看','將題目加入收藏','save')}${menuRow('refresh','重新載入題目','模擬 API 重新取得資料','reloadQuestion')}</div></div></div>`;
 if(state.sheet==='prototype')return `<div class="overlay"><div class="bottom-sheet"><div class="sheet-handle"></div><div class="sheet-title"><div><h2>原型快速操作</h2><p>方便在手機上查看不同角色與狀態。</p></div><button class="icon-btn" data-action="closeSheet">${icon('close')}</button></div><div class="sheet-options"><button class="sheet-option" data-action="protoGuest"><div class="icon">👤</div><strong>訪客模式</strong><span>每日 3 題限制</span></button><button class="sheet-option" data-action="protoMember"><div class="icon">✨</div><strong>會員模式</strong><span>解鎖完整功能</span></button><button class="sheet-option" data-action="protoOffline"><div class="icon">📡</div><strong>離線狀態</strong><span>顯示同步提示</span></button><button class="sheet-option" data-action="protoUpdate"><div class="icon">⬆️</div><strong>強制更新</strong><span>最低版本限制</span></button></div></div></div>`;
 return ''}
function webviewLayer(){if(!state.webview)return '';const privacy=state.webview==='privacy';return `<div class="webview"><div class="topbar"><button class="icon-btn" data-action="closeWebview">${icon('back')}</button><div class="top-title">${privacy?'隱私權政策':'服務條款'}</div><div></div></div><div class="webview-body"><p>最後更新：2026 年 6 月 11 日</p><h2>${privacy?'閃Q 隱私權政策':'閃Q 服務條款'}</h2><p>本頁為前台 UI 原型中的示意內容，正式版本應以 LTrust 官方網站公布之完整文件為準。</p>${privacy?`<h3>一、蒐集的資料</h3><p>帳號資料、就讀高中、年級、性別、作答題目、選項、作答時間、正確率、裝置識別碼、推薦碼與分享轉換資訊。</p><h3>二、使用目的</h3><p>用於登入識別、智慧選題、錯題本、學習分析、Session 紀錄、推薦碼成效與服務品質改善。</p><h3>三、分享內容</h3><p>成績卡片只包含作答題數、正確率與連答紀錄，不包含姓名、學校等個人識別資料。</p>`:`<h3>一、帳號與使用資格</h3><p>使用者應提供正確資料並妥善保管帳號。帳號與 LTrust 其他產品共用。</p><h3>二、題庫與學習紀錄</h3><p>題目內容僅供學習使用。系統會依作答資料提供統計與個人化建議。</p><h3>三、帳號停用</h3><p>使用者可於個人資訊區提出停用需求，並依 LTrust 現行流程辦理。</p>`}</div></div>`}
function renderApp(){const app=$('#app');app.innerHTML=statusBar()+`<div class="app-stage">${renderScreen()}${modalLayer()}${sheetLayer()}${webviewLayer()}${state.toast?`<div class="toast">${state.toast.kind==='success'?'✓':'⚡'} ${state.toast.message}</div>`:''}</div>`;syncProtoButtons();bindTouch()}
function bindTouch(){const v=$('#quizViewport');if(!v)return;v.addEventListener('touchstart',e=>touchStartY=e.changedTouches[0].clientY,{passive:true});v.addEventListener('touchend',e=>{const dy=touchStartY-e.changedTouches[0].clientY;if(Math.abs(dy)<55)return;if(dy>0){state.answered?nextQuestion():(state.qIndex=(state.qIndex+1)%QUESTIONS.length,renderApp())}else prevQuestion()},{passive:true})}
function startVerifyTimer(){clearInterval(verifyTimer);state.verifySeconds=60;verifyTimer=setInterval(()=>{state.verifySeconds=Math.max(0,state.verifySeconds-1);if(state.route==='login'&&state.authView==='verify')renderApp();if(state.verifySeconds===0)clearInterval(verifyTimer)},1000)}
function loginMember(){state.auth=true;state.user={id:'LT-20482'};state.authView='login';state.guestAnswered=0;state.route='quiz';state.activeTab='quiz';state.modal=null;showToast('登入成功，已同步學習資料','success')}
function saveRegisterFields(){state.register.email=$('#regEmail')?.value.trim()||state.register.email;state.register.password=$('#regPassword')?.value||state.register.password;state.register.confirm=$('#regConfirm')?.value||state.register.confirm;state.register.school=$('#regSchool')?.value.trim()||state.register.school;state.register.grade=$('#regGrade')?.value||state.register.grade;state.register.gender=$('#regGender')?.value||state.register.gender;state.register.code=$('#regCode')?.value.trim()||state.register.code;state.register.agree=$('#regAgree')?.checked||false}
function startMistakeQuiz(single=false){let ms=single?MISTAKES.filter(m=>m.qid===state.detailQid):MISTAKES.filter(m=>state.mistakeFilter==='收藏題目'?state.saved.has(m.qid):!m.conquered);if(!ms.length)ms=MISTAKES;state.mistakeQuiz=ms.map(m=>QUESTIONS.find(q=>q.id===m.qid)).filter(Boolean);state.mistakeIndex=0;state.mistakeConquered=0;state.quizContext='mistake';state.quizAnswered=0;state.quizCorrect=0;state.answered=false;state.selected=null;state.route='quiz';state.activeTab='mistakes';renderApp()}
function customQuiz(){state.quizContext='exam';state.quizLimit=state.selection.count;state.quizAnswered=0;state.quizCorrect=0;state.qIndex=0;state.answered=false;state.selected=null;state.route='quiz';state.activeTab='select';renderApp()}
async function shareText(title,text,url='https://ltrust.tw/q/flashq-demo'){try{if(navigator.share){await navigator.share({title,text,url});showToast('已開啟系統分享選單','success')}else{await navigator.clipboard.writeText(`${text}\n${url}`);showToast('分享內容已複製','success')}}catch(e){if(e?.name!=='AbortError')showToast('已取消分享')}}
function handleAction(el){const a=el.dataset.action;if(!a)return;
 switch(a){case'tab':doTab(el.dataset.id);break;case'answer':answerQuestion(Number(el.dataset.index));break;case'nextQuestion':nextQuestion();break;case'like':socialAction('like');break;case'save':socialAction('save');break;case'shareQuestion':if(!state.auth){state.modal='loginRequired';renderApp()}else shareText('閃Q 題目分享',currentQuestion().text);break;case'openMore':state.sheet='more';renderApp();break;case'openModes':state.sheet='modes';renderApp();break;case'openPrototype':state.sheet='prototype';renderApp();break;case'closeSheet':state.sheet=null;renderApp();break;case'dismissAnnouncement':state.announcement=false;renderApp();break;case'showLogin':case'modalLogin':state.modal=null;state.route='login';state.authView='login';renderApp();break;case'closeModal':state.modal=null;renderApp();break;case'authBack':state.route='quiz';state.activeTab='quiz';renderApp();break;case'login':loginMember();break;case'oauth':state.authView='profileSetup';renderApp();break;case'register':state.authView='register';renderApp();break;case'forgot':state.authView='forgot';renderApp();break;case'loginView':state.authView='login';renderApp();break;case'registerView':state.authView='register';renderApp();break;case'submitRegister':saveRegisterFields();if(!state.register.email||!state.register.password||state.register.password!==state.register.confirm||!state.register.school||!state.register.gender||!state.register.code||!state.register.agree){showToast('請完成所有必填欄位');return}state.authView='verify';startVerifyTimer();renderApp();break;case'resend':startVerifyTimer();showToast('驗證信已重新寄送','success');break;case'verified':state.authView='profileSetup';renderApp();break;case'finishSetup':loginMember();break;case'sendReset':showToast('重設密碼信已寄出','success');state.authView='login';renderApp();break;case'privacy':state.webview='privacy';renderApp();break;case'terms':state.webview='terms';renderApp();break;case'closeWebview':state.webview=null;renderApp();break;case'chooseMode':state.selection.mode=el.dataset.mode;state.route='selection';state.activeTab='select';renderApp();break;case'randomQuiz':state.selection={mode:'全隨機挑戰',subject:'綜合',scope:['全範圍'],count:10};customQuiz();break;case'startLastQuiz':state.selection={mode:'段考選題',subject:'數學',scope:['第一冊','第一章','第二章','第三章'],count:10};customQuiz();break;case'selectSubject':state.selection.subject=el.dataset.value;renderApp();break;case'toggleScope':{const v=el.dataset.value,i=state.selection.scope.indexOf(v);i>=0?state.selection.scope.splice(i,1):state.selection.scope.push(v);renderApp();break}case'startCustomQuiz':customQuiz();break;case'exitQuiz':state.quizContext==='mistake'?routeTo('mistakeList','mistakes'):routeTo('select','select');break;case'back':historyBack();break;case'resultBack':state.quizContext==='mistake'?routeTo('mistakes','mistakes'):routeTo('select','select');break;case'retryQuiz':state.quizContext==='mistake'?startMistakeQuiz():customQuiz();break;case'mistakeList':state.mistakeFilter=el.dataset.filter;routeTo('mistakeList','mistakes');break;case'setMistakeFilter':state.mistakeFilter=el.dataset.value;renderApp();break;case'mistakeDetail':state.detailQid=el.dataset.qid;routeTo('mistakeDetail','mistakes');break;case'startMistakeQuiz':startMistakeQuiz();break;case'singleMistakeQuiz':startMistakeQuiz(true);break;case'removeMistake':showToast('已從錯題本移除');routeTo('mistakeList','mistakes');break;case'editProfile':routeTo('editProfile','dashboard');break;case'saveProfile':state.profile.name=$('#profileName')?.value||state.profile.name;state.profile.school=$('#profileSchool')?.value||state.profile.school;state.profile.grade=$('#profileGrade')?.value||state.profile.grade;state.profile.gender=$('#profileGender')?.value||state.profile.gender;showToast('個人資料已更新','success');routeTo('dashboard','dashboard');break;case'redeem':routeTo('redeem','dashboard');break;case'submitRedeem':state.redeemCode=$('#redeemInput')?.value.trim().toUpperCase()||'';if(!state.redeemCode){showToast('請先輸入兌換碼');return}state.modal='redeem';renderApp();break;case'goLTrust':state.modal=null;showToast('原型：已帶碼開啟 LTrust','success');renderApp();break;case'logout':state.auth=false;state.user=null;state.route='quiz';state.activeTab='quiz';state.guestAnswered=0;showToast('已登出，切換為訪客模式');break;case'deactivate':state.modal='deactivate';renderApp();break;case'confirmDeactivate':state.auth=false;state.modal=null;state.route='quiz';state.activeTab='quiz';state.guestAnswered=0;showToast('帳號已停用（原型模擬）');break;case'upgrade':showToast('原型：開啟進階題庫方案');break;case'notifications':showToast('今天有 2 個學習提醒');break;case'showSubjectDetail':showToast('完整科目分析將沿用目前圖表樣式');break;case'recordFilter':state.recordFilter=el.dataset.value;renderApp();break;case'recordDetail':state.currentRecord=RECORDS.find(r=>r.id===el.dataset.id)||RECORDS[0];routeTo('recordDetail','records');break;case'scorecard':routeTo('scorecard','records');break;case'nativeShare':shareText('我的閃Q成績',`我在閃Q完成 ${state.currentRecord.total} 題，正確率 ${Math.round(state.currentRecord.correct/state.currentRecord.total*100)}%！`);break;case'shareRecord':routeTo('scorecard','records');break;case'challengeRecord':state.selection={mode:'重新挑戰',subject:state.currentRecord.subject,scope:['相同題組'],count:state.currentRecord.total};customQuiz();break;case'emptyCta':state.emptyMode=false;doTab(el.dataset.target);break;case'modeSpeed':state.sheet=null;state.quizContext='speed';state.route='quiz';state.activeTab='quiz';renderApp();break;case'modeDaily':state.sheet=null;state.quizContext='speed';state.qIndex=3;showToast('已切換為每日精選');break;case'modeCustom':state.sheet=null;requireAuth('select');break;case'modeMistake':state.sheet=null;requireAuth('mistakes');break;case'reportQuestion':state.sheet=null;showToast('已送出題目問題回報','success');break;case'reloadQuestion':state.sheet=null;showToast('題目已重新載入');break;case'protoGuest':state.sheet=null;state.auth=false;state.guestAnswered=0;state.route='quiz';state.activeTab='quiz';renderApp();break;case'protoMember':state.sheet=null;state.auth=true;state.user={id:'LT-20482'};state.route='quiz';state.activeTab='quiz';renderApp();break;case'protoOffline':state.sheet=null;state.offline=true;renderApp();break;case'protoUpdate':state.sheet=null;state.forceUpdate=true;renderApp();break;case'clearOffline':state.offline=false;showToast('連線已恢復','success');break;case'offlineContinue':state.offline=false;renderApp();break;case'clearUpdate':state.forceUpdate=false;showToast('原型：已開啟商店更新頁');break;case'detailExplanation':state.sheet='more';renderApp();break;case'reviewWrong':showToast('已套用「只看錯題」');break;case'filterMistakes':showToast('篩選條件已顯示於上方快捷列');break;default:break}}
function historyBack(){const map={selection:'select',mistakeList:'mistakes',mistakeDetail:'mistakeList',redeem:'dashboard',editProfile:'dashboard',recordDetail:'records',scorecard:'recordDetail'};routeTo(map[state.route]||state.activeTab,state.activeTab)}
document.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(el){e.preventDefault();handleAction(el)}});
document.addEventListener('input',e=>{if(e.target.id==='questionCount'){state.selection.count=Number(e.target.value);renderApp()}});
document.addEventListener('wheel',e=>{if(state.route!=='quiz'||state.modal||state.sheet)return;if(Math.abs(e.deltaY)<35)return;e.preventDefault();if(e.deltaY>0){state.answered?nextQuestion():(state.qIndex=(state.qIndex+1)%QUESTIONS.length,renderApp())}else prevQuestion()},{passive:false});
document.querySelectorAll('[data-proto]').forEach(btn=>btn.addEventListener('click',()=>{const p=btn.dataset.proto;if(p==='guest'){state.auth=false;state.guestAnswered=0;state.route='quiz';state.activeTab='quiz'}if(p==='member'){state.auth=true;state.user={id:'LT-20482'};state.guestAnswered=0;state.route='quiz';state.activeTab='quiz'}if(p==='quota'){state.auth=false;state.guestAnswered=3;state.route='quiz';state.activeTab='quiz';state.modal='quota'}if(p==='reset')resetPrototype();renderApp()}));
document.querySelectorAll('[data-jump]').forEach(btn=>btn.addEventListener('click',()=>{const j=btn.dataset.jump;if(j==='login'){state.route='login';state.authView='login';state.modal=null}else if(j==='result'){state.auth=true;state.quizAnswered=10;state.quizCorrect=8;state.route='examResult';state.activeTab='select'}else if(j==='scorecard'){state.auth=true;state.currentRecord=RECORDS[0];state.route='scorecard';state.activeTab='records'}else{state.auth=j!=='quiz';state.route=j;state.activeTab=j==='quiz'?'quiz':j}renderApp()}));
document.querySelectorAll('[data-state]').forEach(btn=>btn.addEventListener('click',()=>{const s=btn.dataset.state;if(s==='announcement')state.announcement=true;if(s==='offline')state.offline=true;if(s==='update')state.forceUpdate=true;if(s==='empty')state.emptyMode=!state.emptyMode;renderApp()}));
renderApp();
</script>
</body>
</html>

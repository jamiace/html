<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title></title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="game-shell">
    <canvas id="game"></canvas>

    <section id="hud" class="hidden" aria-live="polite">
      <div class="hud-top">
        <div class="brand"><span class="brand-mark"></span><span></span></div>
        <div class="timer-wrap"><span id="timer"></span><small></small></div>
        <div class="stats-compact">
          <span class="stat-item score-stat">
            <em id="score-label">分數</em>
            <b id="score">100</b>
          </span>
          <span class="stat-item">
            <em id="level-label">LV</em>
            <b id="level">1</b>
          </span>
          <span class="stat-item">
            <em id="kills-label">擊殺</em>
            <b id="kills">0</b>
          </span>
        </div>
      </div>
      <div class="bar-cluster">
        <div class="bar-row hp-row"><span></span><div class="bar"><i id="hp-fill"></i><em id="hp-text"></em></div></div>
        <div class="bar-row exp-row"><span></span><div class="bar"><i id="exp-fill"></i><em id="exp-text"></em></div></div>
      </div>
      <div id="passive-rack" class="passive-rack hidden" aria-label="永久升級"></div>
      <div id="weapon-rack" class="weapon-rack"></div>
      <div id="effect-rack" class="effect-rack"></div>
      <button id="pause-btn" class="icon-button"></button>
    </section>

    <section id="start-screen" class="modal-screen show">
      <div class="start-card panel">
        <div class="eyebrow"></div><h1></h1><p class="subtitle"></p><p class="lead"></p>
        <p id="start-build-note" style="margin:-12px 0 18px;color:#6fe8ff;font-size:12px;font-weight:900;letter-spacing:.12em"></p>
        <div class="feature-grid"></div><div class="controls"></div>
        <div class="start-actions"><button id="start-btn" class="primary-btn"></button><button id="sound-btn" class="secondary-btn"></button></div>
      </div>
    </section>

    <section id="level-screen" class="modal-screen">
      <div class="level-panel panel">
        <div class="chest-stage"><img src="" alt=""><div class="chest-glow"></div></div>
        <p class="eyebrow"></p><h2></h2><div id="reward-cards" class="reward-cards"></div><p class="key-hint"></p>
      </div>
    </section>

    <section id="pause-screen" class="modal-screen">
      <div class="pause-card panel">
        <p class="eyebrow"></p><h2></h2><p></p>
        <div id="pause-loadout" class="pause-loadout" aria-live="polite">
          <section class="pause-loadout-section">
            <div class="pause-loadout-heading"><h3 id="pause-weapons-title">目前武器</h3><span id="pause-weapons-count"></span></div>
            <div id="pause-weapons-list" class="pause-loadout-list"></div>
          </section>
          <section class="pause-loadout-section">
            <div class="pause-loadout-heading"><h3 id="pause-passives-title">永久升級</h3><span id="pause-passives-count"></span></div>
            <div id="pause-passives-list" class="pause-loadout-list"></div>
          </section>
        </div>
        <button id="resume-btn" class="primary-btn"></button>
        <button id="restart-pause-btn" class="secondary-btn"></button>
      </div>
    </section>

    <section id="end-screen" class="modal-screen">
      <div class="end-card panel">
        <p id="end-eyebrow" class="eyebrow"></p><h2 id="end-title"></h2><p id="end-copy"></p>
        <div class="result-grid">
          <div class="result-score-card"><span id="result-score-label">分數</span><b id="result-score"></b></div>
          <div><span id="result-time-label"></span><b id="result-time"></b></div>
          <div><span id="result-level-label"></span><b id="result-level"></b></div>
          <div><span id="result-kills-label"></span><b id="result-kills"></b></div>
          <div><span id="result-weapons-label"></span><b id="result-weapons"></b></div>
        </div>
        <section id="online-score-panel" class="online-score-panel hidden" aria-live="polite">
          <div class="score-panel-heading">
            <strong>登錄線上成績</strong>
            <span>擊敗 Boss 後可將本次紀錄送到 Google Sheets</span>
          </div>
          <label class="score-name-field" for="score-player-name">
            <span>玩家名稱</span>
            <input id="score-player-name" type="text" maxlength="20" autocomplete="nickname" placeholder="請輸入名稱" />
          </label>
          <button id="submit-score-btn" class="primary-btn score-submit-btn" type="button">送出成績</button>
          <p id="score-submit-status" class="score-submit-status"></p>
        </section>

        <section id="leaderboard-panel" class="leaderboard-panel hidden" aria-live="polite">
          <div class="leaderboard-heading">
            <div>
              <strong>線上排行榜 Top 50</strong>
              <span id="leaderboard-rule">分數較高者優先</span>
            </div>
            <button id="leaderboard-refresh-btn" class="secondary-btn leaderboard-refresh-btn" type="button">重新整理</button>
          </div>
          <p id="leaderboard-status" class="leaderboard-status"></p>
          <div class="leaderboard-table-wrap">
            <table class="leaderboard-table">
              <thead>
                <tr><th>排名</th><th>分數</th><th>姓名</th><th>擊殺數</th><th>Boss剩餘</th><th>等級</th></tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </div>
        </section>

        <button id="restart-btn" class="primary-btn"></button>
      </div>
    </section>

    <div id="toast-layer"></div><div id="damage-flash"></div>
    <div id="touch-controls" aria-hidden="true"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
  </main>
  <script src="game.js"></script>
</body>
</html>

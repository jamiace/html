<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模擬AI對戰 Web版</title>
  <style>
    :root{--bg:#050505;--panel:#111;--panel2:#171717;--line:#4c4c4c;--text:#fff;--muted:#b9b9b9;--green:#64ff64;--red:#ff6464;--yellow:#ffe699;--select:#ffff64;--rank:#c0ffff;--blue:#6464e6;--orange:#ffb000;--danger:#ff3030;--bar:#ffe699;--formW:1040px;--formH:871px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 0%,#222 0,#050505 56%);color:var(--text);font-family:"Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{display:flex;justify-content:center;padding:18px}button,input,select{font:inherit}button{cursor:pointer;color:inherit}.app{width:min(100%,1480px)}.top-note{width:var(--formW);max-width:100%;margin:0 auto 10px;color:#ddd;font-size:12px;line-height:1.6;text-align:center}.screen{display:none}.screen.active{display:block}.form{position:relative;margin:0 auto;background:#000;border:2px solid #555;box-shadow:0 20px 70px rgba(0,0,0,.75),inset 0 0 0 1px #222;overflow:hidden}.form.game{width:min(100%,var(--formW));min-height:var(--formH);padding:14px 16px 18px}.form.result{width:min(100%,747px);min-height:897px;padding:18px}.form.level{width:min(100%,1440px);min-height:762px;padding:18px}.form-title{position:absolute;left:10px;top:8px;color:#aaa;font-size:12px;letter-spacing:.12em}.hidden{display:none!important}.loading-panel{width:min(100%,760px);margin:10vh auto;background:#080808;border:2px solid #555;padding:22px;border-radius:10px;line-height:1.8}.loading-panel h1{margin:0 0 10px}.loading-panel code{background:#222;border:1px solid #555;padding:2px 6px;border-radius:4px}.file-row{display:grid;grid-template-columns:160px 1fr;gap:10px;align-items:center;margin:10px 0}.file-row input{border:1px solid #555;background:#111;color:#fff;padding:8px;width:100%}.primary{background:#222;border:2px solid #888;padding:10px 18px;border-radius:6px}.primary:hover{background:#333}.warn{color:#ffd37a}.error{color:#ff8a8a}
    .level-header{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;margin:16px 0 18px}.level-header h1{font-size:32px;margin:0}.setup{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.setup input,.setup select{background:#080808;border:1px solid #666;color:#fff;padding:8px 10px;border-radius:3px}.rules{font-size:13px;color:#ddd;max-width:620px;line-height:1.55;margin-top:8px}.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.level-card{position:relative;height:276px;background:#070707;border:3px solid #111;outline:1px solid #555;padding:12px;text-align:center;transition:.12s}.level-card:hover,.level-card.selected{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue),0 0 26px rgba(100,100,230,.35);transform:translateY(-2px)}.level-card .stage{font-size:24px;color:#ddd;margin:4px 0 6px}.level-card img{width:112px;height:112px;object-fit:cover;background:#222;border:1px solid #555;margin:6px auto 10px;display:block}.level-card .lv-title{min-height:42px;display:grid;place-items:center;font-size:18px;color:#fff;font-weight:700;line-height:1.25}.level-card .lv-meta{color:#aaa;font-size:12px;line-height:1.5}.level-card .over{position:absolute;inset:0;background:transparent;border:0;font-size:0}.footer-actions{text-align:center;margin-top:18px}.start-btn{font-size:24px;font-weight:900;background:#111;border:3px solid #aaa;padding:12px 42px}.start-btn:hover{background:#222;border-color:#fff}
    .battle-top{height:150px;position:relative;border-bottom:1px solid #222;margin-bottom:12px}.question-label{position:absolute;left:50%;top:18px;transform:translateX(-50%);width:420px;min-height:56px;text-align:center;color:#fff;font-size:36px;font-weight:900;line-height:1.2;letter-spacing:.04em;word-break:break-word;text-shadow:0 2px 0 #000,0 0 12px rgba(255,255,255,.45)}.question-label.active{color:#fff;font-size:40px;text-shadow:0 2px 0 #000,0 0 16px rgba(255,255,255,.6)}.timer-area{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);display:flex;align-items:center;gap:9px}.timer-box{position:relative;width:64px;height:64px;display:grid;place-items:center}.timer-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.timer-number{position:relative;z-index:1;font-size:34px;font-weight:900;color:#d80000;-webkit-text-stroke:1px rgba(255,255,255,.9);text-shadow:0 2px 0 #fff,0 0 5px #000}.timer-number.big{font-size:42px;color:#d80000}.bomb-track{position:relative;width:216px;height:34px;display:flex;align-items:center}.bomb-img{position:absolute;left:0;width:42px;height:42px;object-fit:contain;z-index:2}.bomb-bar-shell{position:absolute;left:44px;right:22px;height:14px;background:#222;border:1px solid #555;overflow:hidden}.bomb-bar{height:100%;width:100%;background:#00ff80}.bomb-bar.mid{background:#8080ff}.bomb-bar.low{background:#ff0000}.spark-img{position:absolute;left:194px;width:28px;height:28px;object-fit:contain;z-index:3}.battle-body{display:grid;grid-template-columns:220px minmax(0,1fr) 220px;gap:14px;min-height:620px}.side{position:relative;background:#020202;border:1px solid #444;padding:10px 8px}.side h2{font-size:16px;text-align:center;margin:0 0 8px;min-height:44px;line-height:1.35}.head{width:92px;height:92px;object-fit:cover;display:block;margin:0 auto 8px;background:#222;border:1px solid #666}.score-num{text-align:center;font-size:24px;font-weight:900;color:#fff;min-height:34px}.gain{text-align:center;color:var(--yellow);font-size:18px;min-height:28px;font-weight:900}.combo{text-align:center;color:var(--yellow);font-size:16px;min-height:25px;font-weight:900}.score-tube{position:absolute;left:50%;bottom:190px;transform:translateX(-50%);width:52px;height:174px;border:2px solid #bda85d;border-radius:13px;background:#111;overflow:hidden;display:flex;align-items:flex-end}.score-fill{width:100%;height:0%;background:linear-gradient(180deg,#fff7a6 0%,var(--bar) 45%,#c99720 100%);transition:height .22s ease;border-radius:0}.score-tube::after{content:"";position:absolute;inset:0;border-radius:11px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.65),inset 0 0 18px rgba(255,255,255,.1);pointer-events:none}.side-label{position:absolute;bottom:150px;left:0;right:0;text-align:center;color:#cfcfcf;font-size:14px;letter-spacing:.04em}.speech{position:absolute;left:8px;right:8px;bottom:8px;min-height:42px;border:1px solid #555;background:#111;padding:8px;color:#fff;font-size:13px;line-height:1.4}.ai-side .speech{left:14px;right:14px;bottom:10px;min-height:112px;height:112px;padding:14px 16px;font-size:18px;line-height:1.45;overflow:auto;word-break:normal;overflow-wrap:break-word;text-align:left}.ai-side .speech::-webkit-scrollbar{width:6px}.ai-side .speech::-webkit-scrollbar-thumb{background:#555;border-radius:4px}.arena{position:relative;background:#050505;border:1px solid #333;padding:14px}.question-main{min-height:120px;display:grid;place-items:center;text-align:center;font-size:36px;line-height:1.25;color:#4040ff;font-weight:900;border:1px solid #333;background:#090909;padding:12px;word-break:break-word}.phonetic{font-size:15px;color:#aaa;margin-top:6px;text-align:center;min-height:22px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.answer-btn{position:relative;min-height:116px;text-align:center;background:#000;border:2px solid #555;color:#fff;padding:16px 12px;font-size:22px;line-height:1.35;word-break:break-word}.answer-btn:hover{border-color:#aaa;background:#111}.answer-btn.locked{pointer-events:none}.answer-btn.correct{background:var(--green);color:#000;border-color:#d6ffd6}.answer-btn.wrong{background:var(--red);color:#000;border-color:#ffd6d6}.answer-key{position:absolute;left:8px;top:8px;background:#222;color:#fff;border:1px solid #777;width:26px;height:26px;display:grid;place-items:center;font-size:15px;font-weight:900}.answer-btn.correct .answer-key,.answer-btn.wrong .answer-key{background:#fff;color:#000}.answer-marks{position:absolute;right:8px;top:8px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;z-index:3}.answer-mark{display:flex;align-items:center;gap:4px;min-width:58px;justify-content:flex-end;padding:2px 5px;border:1px solid rgba(255,255,255,.8);background:rgba(0,0,0,.72);border-radius:4px;color:#fff;font-size:11px;font-weight:900;letter-spacing:.04em}.answer-mark img{width:22px;height:22px;object-fit:contain;flex:0 0 auto}.answer-mark.user{border-color:#ffe699;color:#ffe699}.answer-mark.ai{border-color:#9ee7ff;color:#9ee7ff}.fallback-mark{font-size:12px;background:rgba(255,255,255,.75);color:#000;border-radius:3px;padding:2px 4px}.battle-footer{position:absolute;left:14px;right:14px;bottom:14px;display:flex;justify-content:space-between;align-items:center;color:#aaa;font-size:12px}.end-btn{background:#111;border:1px solid #777;padding:6px 12px;color:#ddd}.end-btn:hover{color:#fff;border-color:#fff}
    .result-banner-img{width:100%;height:170px;object-fit:cover;background:#111;border:1px solid #555;margin:8px 0 14px}.result-vs{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:10px 0}.result-player{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:center;background:#060606;border:1px solid #444;padding:10px}.result-player img{width:92px;height:92px;object-fit:cover;background:#222;border:1px solid #555}.result-player h2{font-size:19px;margin:0 0 4px}.result-player .score{font-size:32px;font-weight:900}.result-icons{display:flex;justify-content:center;gap:70px;margin:8px 0}.result-icons img{width:60px;height:60px;object-fit:contain}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.metric{background:#090909;border:1px solid #444;padding:12px;text-align:center}.metric b{font-size:26px}.metric span{display:block;color:#aaa;font-size:12px;margin-top:4px}.rank-title{font-size:18px;font-weight:900;margin:18px 0 8px}.rank-status{min-height:22px;color:#b9b9b9;font-size:13px;line-height:1.5;margin:-2px 0 8px}.rank-status.error{color:#ff8a8a}.rank-table{width:100%;border-collapse:collapse;font-size:15px}.rank-table th{background:#222;color:#ccc;font-weight:700}.rank-table th,.rank-table td{border:1px solid #555;padding:8px;text-align:left}.rank-table tr.me td{background:var(--rank);color:#000;font-weight:900}.again-row{text-align:center;margin-top:18px}.again-row button{background:#111;border:2px solid #aaa;padding:10px 22px;margin:0 4px}.asset-missing{filter:grayscale(1);opacity:.22}
    @media (max-width:820px){body{padding:8px}.form.game{--formW:100%;padding:8px;min-height:auto}.battle-body{grid-template-columns:96px minmax(0,1fr) 96px;gap:6px}.side{padding:8px 4px}.head{width:70px;height:70px}.question-main{font-size:28px}.answer-btn{font-size:18px;min-height:94px}.score-tube{width:40px;height:140px;bottom:82px}.level-grid{grid-template-columns:repeat(2,1fr)}.form.level{min-height:auto}.level-card{height:230px}.level-header{grid-template-columns:1fr}.setup{justify-content:flex-start}.metrics{grid-template-columns:1fr}.result-vs{grid-template-columns:1fr}}
    @media (max-width:820px){.question-label{width:280px;font-size:28px}.question-label.active{font-size:30px}.timer-number{font-size:30px}.timer-number.big{font-size:36px}.score-tube{bottom:168px}.side-label{bottom:132px}.ai-side .speech{left:8px;right:8px;min-height:108px;height:108px;font-size:15px;padding:10px;line-height:1.45}.answer-mark{min-width:46px;font-size:10px;padding:2px 4px}.answer-mark img{width:18px;height:18px}}
    /* v8: 左右側欄等寬，中央戰鬥區回到視覺中心 */
    .battle-body{align-items:stretch}
    .user-side,.ai-side{min-width:0}
    .ai-side .speech{left:14px;right:14px;width:auto;max-width:none}
    @media (max-width:560px){.battle-body{grid-template-columns:82px minmax(0,1fr) 82px}.side h2{font-size:13px}.head{width:62px;height:62px}.score-num{font-size:20px}.ai-side .speech{font-size:13px}}

  
    /* v9: 玩家資料必填，未輸入名字前不可選對手或開始遊戲 */
    .setup-msg{flex-basis:100%;text-align:right;color:#ffdd66;font-size:13px;min-height:20px;line-height:1.4}
    .setup-msg.error{color:#ff8a8a}
    .start-btn:disabled{opacity:.38;cursor:not-allowed;border-color:#666;color:#999;background:#090909}
    .level-grid.player-locked .level-card{opacity:.55;filter:grayscale(.45)}
    .level-grid.player-locked .level-card.selected{opacity:.82;filter:none}
    .level-grid.player-locked .level-card:hover{transform:none;border-color:#111;box-shadow:none}

  </style>
</head>
<body>
  <main class="app">
    <section id="loading" class="loading-panel">
      <h1>模擬AI對戰 Web版</h1>
      <p>正在讀取 <code>data/game-config.json</code> 與 <code>data/vocab.json</code>。</p>
      <p class="warn">如果你是直接雙擊 index.html，部分瀏覽器會擋掉本機 JSON 讀取。可以用底下手動載入，或執行資料夾內的「啟動本機伺服器.bat」。</p>
      <div class="file-row"><label>game-config.json</label><input id="configFile" type="file" accept=".json,application/json"></div>
      <div class="file-row"><label>vocab.json</label><input id="vocabFile" type="file" accept=".json,application/json"></div>
      <button id="manualLoad" class="primary">手動載入 JSON</button>
      <p id="loadMsg" class="error"></p>
    </section>
    <div id="gameRoot" class="hidden">
      <section id="screenLevel" class="screen active"><div class="form level"><div class="level-header"><div><h1>選擇挑戰難度</h1><div id="rules" class="rules"></div></div><div class="setup"><label>玩家名稱 <input id="playerName" maxlength="20" required autocomplete="off" placeholder="請輸入名字"></label><label>玩家頭像/身分 <select id="playerProfile" required></select></label><div id="playerSetupMsg" class="setup-msg" aria-live="polite"></div></div></div><div id="levelGrid" class="level-grid"></div><div class="footer-actions"><button id="startBtn" class="start-btn">開始對戰</button></div></div></section>
      <section id="screenBattle" class="screen"><div class="form game"><div class="form-title">模擬AI對戰</div><div class="battle-top"><div id="questionLabel" class="question-label">第1題</div><div class="timer-area"><div class="timer-box"><img id="timerImg" alt="timer"><span id="timerNumber" class="timer-number">10</span></div><div class="bomb-track"><img id="bombImg" class="bomb-img" alt="bomb"><div class="bomb-bar-shell"><div id="bombBar" class="bomb-bar"></div></div><img id="sparkImg" class="spark-img" alt="spark"></div></div></div><div class="battle-body"><aside class="side user-side"><h2 id="userTitle"></h2><img id="userHead" class="head" alt="user"><div id="userScore" class="score-num">0</div><div id="userGain" class="gain"></div><div id="userCombo" class="combo"></div><div class="score-tube"><div id="userScoreFill" class="score-fill"></div></div><div class="side-label">USER SCORE</div></aside><section class="arena"><div id="questionMain" class="question-main"></div><div id="phonetic" class="phonetic"></div><div id="answers" class="answers"></div><div class="battle-footer"><span>快捷鍵：1 / 2 / 3 / 4　答題後不可更改</span><button id="forceEnd" class="end-btn">結束</button></div></section><aside class="side ai-side"><h2 id="aiTitle"></h2><img id="aiHead" class="head" alt="ai"><div id="aiScore" class="score-num">0</div><div id="aiGain" class="gain"></div><div id="aiCombo" class="combo"></div><div class="score-tube"><div id="aiScoreFill" class="score-fill"></div></div><div class="side-label">AI SCORE</div><div id="aiSpeech" class="speech"></div></aside></div></div></section>
      <section id="screenResult" class="screen"><div class="form result"><div class="form-title">結算成績</div><img id="resultBanner" class="result-banner-img" alt="result"><div class="result-vs"><div class="result-player"><img id="resultUserHead" alt="user"><div><h2 id="resultUserTitle"></h2><div id="resultUserScore" class="score"></div></div></div><div class="result-player"><img id="resultAiHead" alt="ai"><div><h2 id="resultAiTitle"></h2><div id="resultAiScore" class="score"></div></div></div></div><div class="result-icons"><img id="resultUserIcon" alt="user icon"><img id="resultAiIcon" alt="ai icon"></div><div class="metrics"><div class="metric"><b id="rateMetric"></b><span>答對率</span></div><div class="metric"><b id="comboMetric"></b><span>最高 Combo</span></div><div class="metric"><b id="stageMetric"></b><span>挑戰 Stage</span></div></div><div class="rank-title">排行榜 Top 100 / 目前名次附近</div><div id="rankStatus" class="rank-status"></div><table class="rank-table"><thead><tr><th>Rank</th><th>Score</th><th>Title</th><th>Level</th></tr></thead><tbody id="rankBody"></tbody></table><div class="again-row"><button id="backLevel">重新選難度</button><button id="againSame">同難度再戰</button></div></div></section>
    </div>
  </main>
  <script src="js/game.js"></script>
</body>
</html>
